<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOPIA 批次即時毛利</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ── 2026-07-17 視覺改版 v2：套用「亮色 KPI 儀表板 + 手機卡片流」方向。
     淺色中性底、白卡圓角＋柔和陰影、毛利綠／虧損紅的語意色碼、IBM Plex Mono 等寬數字、
     放大 KPI 數字、手機自動轉成每批一張卡片。資料來源、密碼驗證、成本／物流寫入邏輯完全不動，只換版面與視覺。 */
  :root {
    --color-profit: #127a4e; --color-profit-bg: #e6f4ec;
    --color-loss: #c23616; --color-loss-bg: #fbe9e4;
    --color-accent: #c23616; --color-accent-200: #fbe9e4; --color-accent-600: #a82f13; --color-accent-700: #8f2410;
    --color-text: #1e2329; --color-bg: #f4f5f6; --color-surface: #ffffff; --color-surface-2: #fafbfb;
    --color-neutral-200: #eef0f2; --color-neutral-300: #e2e5e8; --color-neutral-400: #b9bec4;
    --color-neutral-600: #6c757d; --color-neutral-700: #4a5057;
    --border: 1px solid var(--color-neutral-300);
    --radius: 16px; --radius-md: 12px; --radius-sm: 9px;
    --shadow: 0 1px 2px rgba(20,24,31,.05), 0 14px 34px rgba(20,24,31,.06);
    --shadow-sm: 0 1px 2px rgba(20,24,31,.05);
    --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-6: 24px; --space-8: 32px;
    --font: 'Archivo', 'Noto Sans TC', 'Noto Sans JP', -apple-system, sans-serif;
    --mono: 'IBM Plex Mono', ui-monospace, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); color: var(--color-text); background: var(--color-bg); line-height: 1.5; -webkit-font-smoothing: antialiased; }
  .num { font-family: var(--mono); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  :focus-visible { outline: 2px solid var(--color-profit); outline-offset: 2px; }
  a { color: var(--color-profit); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ── 密碼閘門 ── */
  #gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--color-bg); padding: 20px; }
  #gate .box { background: var(--color-surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 44px 40px; width: 340px; text-align: center; border: var(--border); }
  #gate h1 { font-size: 23px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.01em; }
  #gate p { font-size: 12.5px; color: var(--color-neutral-600); margin-bottom: 26px; }
  #gate input {
    width: 100%; padding: 12px 14px; border: var(--border); border-radius: var(--radius-sm);
    background: var(--color-surface-2); font-family: var(--font); font-size: 14px; margin-bottom: 14px; text-align: center; color: var(--color-text);
  }
  #gate input:focus { outline: none; border-color: var(--color-profit); background: var(--color-surface); }
  #gate button {
    width: 100%; padding: 12px; border: none; border-radius: var(--radius-sm); background: var(--color-text);
    color: #fff; font-family: var(--font); font-weight: 700; font-size: 14px; letter-spacing: 0.3px; cursor: pointer; transition: background .15s;
  }
  #gate button:hover:not(:disabled) { background: #000; }
  #gate button:disabled { opacity: 0.5; cursor: not-allowed; }
  #gate .err { color: var(--color-loss); font-size: 12px; margin-top: 12px; min-height: 16px; font-weight: 600; }

  /* ── 主畫面 ── */
  #app { display: none; }
  .pd-wrap { max-width: 1200px; margin: 0 auto; padding: var(--space-8) var(--space-6) var(--space-8); }
  @media (max-width: 720px) { .pd-wrap { padding: var(--space-4) var(--space-3) var(--space-8); } }

  .pd-head { display: flex; align-items: flex-end; justify-content: space-between; gap: var(--space-4); flex-wrap: wrap; margin-bottom: var(--space-3); }
  .pd-eyebrow { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--color-neutral-600); margin-bottom: 6px; font-weight: 700; }
  .pd-h1 { font-size: 32px; line-height: 1.05; font-weight: 800; letter-spacing: -0.02em; }
  .pd-headctrl { display: flex; align-items: center; gap: var(--space-3); flex-wrap: wrap; }
  .pd-chk { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; user-select: none; color: var(--color-neutral-700); }
  .pd-chk input { width: 16px; height: 16px; accent-color: var(--color-profit); cursor: pointer; }
  button.btn { font-family: var(--font); font-size: 13px; font-weight: 600; padding: 9px 15px; border: none; border-radius: var(--radius-sm); background: var(--color-text); color: #fff; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: background .15s, box-shadow .15s; }
  button.btn:hover:not(:disabled) { background: #000; }
  button.btn.btn-secondary { background: var(--color-surface); color: var(--color-text); border: var(--border); box-shadow: var(--shadow-sm); }
  button.btn.btn-secondary:hover:not(:disabled) { background: var(--color-neutral-200); }
  button.btn:disabled { opacity: .5; cursor: not-allowed; }
  button.btn svg { transition: transform .5s ease; }
  button.btn.spinning svg { transform: rotate(360deg); }
  .pd-helper { font-size: 12px; color: var(--color-neutral-600); margin-bottom: var(--space-4); line-height: 1.6; }

  /* ── 語言切換 ── */
  .pd-langseg { display: flex; border: var(--border); border-radius: var(--radius-sm); overflow: hidden; background: var(--color-surface); box-shadow: var(--shadow-sm); }
  .pd-langseg button { font-family: var(--font); font-size: 12px; font-weight: 600; padding: 8px 13px; border: none; background: transparent; color: var(--color-neutral-700); cursor: pointer; transition: background .15s, color .15s; }
  .pd-langseg button.active { background: var(--color-text); color: #fff; }

  /* ── 待處理提醒卡 ── */
  .pd-todo { background: var(--color-surface); border: var(--border); border-left: 4px solid var(--color-accent); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); margin-bottom: var(--space-4); padding: var(--space-3) var(--space-4); }
  .pd-todo-title { font-size: 11px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--color-neutral-600); margin-bottom: 8px; }
  .pd-todo-row { display: flex; gap: 9px; font-size: 13px; line-height: 1.65; align-items: flex-start; }
  .pd-todo-row + .pd-todo-row { margin-top: 6px; }
  .pd-todo-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; background: var(--color-neutral-400); }
  .pd-todo-dot.bad { background: var(--color-accent); }
  .pd-todo-tag { font-weight: 800; margin-right: 3px; }

  /* ── KPI 列 ── */
  .pd-kpi { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-3); margin-bottom: var(--space-6); }
  @media (max-width: 720px) { .pd-kpi { grid-template-columns: repeat(2, 1fr); gap: var(--space-2); } }
  .pd-kpi > div { background: var(--color-surface); border: var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: var(--space-4) var(--space-4) 18px; }
  .pd-kpi .lbl { font-size: 12px; letter-spacing: .02em; color: var(--color-neutral-600); font-weight: 600; }
  .pd-kpi .val { font-size: 30px; font-weight: 700; margin-top: 8px; line-height: 1; font-family: var(--mono); letter-spacing: -0.02em; }
  @media (max-width: 720px) { .pd-kpi .val { font-size: 24px; } }
  .pd-kpi .sub { font-size: 12px; color: var(--color-neutral-600); margin-top: 8px; }
  .pd-kpi .accent { background: var(--color-text); border-color: var(--color-text); }
  .pd-kpi .accent .lbl { color: rgba(255,255,255,.62); }
  .pd-kpi .accent .sub { color: rgba(255,255,255,.55); }
  .pd-kpi .accent .val { color: #6ee0a4; }

  /* ── 狀態分頁 ── */
  .pd-tabs { display: flex; gap: var(--space-2); margin-bottom: var(--space-3); flex-wrap: wrap; }
  .pd-tab { font-family: var(--font); font-size: 13px; font-weight: 600; padding: 8px 14px; cursor: pointer; background: var(--color-surface); border: var(--border); border-radius: 999px; color: var(--color-neutral-700); display: flex; align-items: center; gap: 7px; box-shadow: var(--shadow-sm); transition: all .15s; }
  .pd-tab:hover { border-color: var(--color-neutral-400); }
  .pd-tab.active { border-color: var(--color-text); background: var(--color-text); color: #fff; }
  .pd-tab .cnt { font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 999px; background: var(--color-neutral-200); color: var(--color-neutral-700); }
  .pd-tab.active .cnt { background: rgba(255,255,255,.2); color: #fff; }

  /* ── 次要控制列：排序／只看虧損 ── */
  .pd-controls { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-4); flex-wrap: wrap; font-size: 12.5px; }
  .pd-controls .lbl { color: var(--color-neutral-600); }
  .pd-seg { display: flex; border: var(--border); border-radius: var(--radius-sm); overflow: hidden; background: var(--color-surface); box-shadow: var(--shadow-sm); }
  .pd-seg button { font-family: var(--font); font-size: 12px; font-weight: 600; padding: 7px 13px; border: none; background: transparent; color: var(--color-neutral-700); cursor: pointer; transition: background .15s, color .15s; }
  .pd-seg button.active { background: var(--color-text); color: #fff; }
  .pd-controls .pd-chk { margin-left: auto; }

  /* ── 視覺區：長條圖＋區間圖 ── */
  .pd-visual { display: grid; grid-template-columns: 1.5fr 1fr; gap: var(--space-4); margin-bottom: var(--space-4); }
  @media (max-width: 860px) { .pd-visual { grid-template-columns: 1fr; } }
  .pd-panel { background: var(--color-surface); border: var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: var(--space-6); }
  .pd-panel h3 { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  .pd-panel-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: var(--space-4); }
  .pd-panel-head .unit { font-size: 11px; color: var(--color-neutral-600); letter-spacing: .06em; text-transform: uppercase; font-weight: 600; }
  .pd-bar-row { display: grid; grid-template-columns: 130px 1fr 108px; align-items: center; gap: 10px; }
  .pd-bar-row + .pd-bar-row { margin-top: 12px; }
  .pd-bar-name { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--color-neutral-700); }
  .pd-bar-track { height: 16px; background: var(--color-neutral-200); border-radius: 999px; position: relative; }
  .pd-bar-fill { height: 100%; border-radius: 999px; }
  .pd-bar-val { font-size: 13px; font-weight: 700; text-align: right; font-family: var(--mono); }
  .pd-empty-note { font-size: 12px; color: var(--color-neutral-600); }

  .pd-bucket + .pd-bucket { margin-top: var(--space-3); }
  .pd-bucket-head { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
  .pd-bucket-head .cnt { font-weight: 700; font-family: var(--mono); }
  .pd-bucket-track { height: 9px; background: var(--color-neutral-200); border-radius: 999px; overflow: hidden; }
  .pd-bucket-fill { height: 100%; border-radius: 999px; }

  /* ── 表格共用 ── */
  .pd-table-wrap { background: var(--color-surface); border: var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); margin-bottom: var(--space-4); overflow: hidden; }
  .pd-table-head { display: flex; align-items: center; justify-content: space-between; padding: var(--space-4) var(--space-6); border-bottom: var(--border); flex-wrap: wrap; gap: 8px; }
  .pd-table-head h3 { font-size: 15px; font-weight: 700; }
  .pd-table-head .meta { font-size: 12px; color: var(--color-neutral-600); }
  .pd-scroll { overflow-x: auto; }
  table.pd-table { width: 100%; border-collapse: collapse; min-width: 920px; }
  table.pd-table thead th { text-align: left; font-size: 11px; font-weight: 700; letter-spacing: .03em; text-transform: uppercase; color: var(--color-neutral-600); padding: 12px 16px; border-bottom: var(--border); white-space: nowrap; background: var(--color-surface-2); }
  table.pd-table td { padding: 13px 16px; border-bottom: 1px solid var(--color-neutral-200); font-size: 14px; vertical-align: top; }
  table.pd-table tbody tr:last-child td { border-bottom: none; }
  table.pd-table th.r, table.pd-table td.r { text-align: right; }
  tr.pd-row { cursor: pointer; transition: background .12s; }
  tr.pd-row:hover td { background: var(--color-surface-2); }
  .pd-name { font-weight: 700; display: flex; align-items: center; gap: 5px; }
  .pd-id { font-size: 11px; color: var(--color-neutral-600); margin-top: 2px; font-family: var(--mono); }
  .pd-cost { width: 82px; text-align: right; min-height: 30px; padding: 5px 8px; font-family: var(--mono); font-variant-numeric: tabular-nums; font-size: 13px; font-weight: 600; background: var(--color-surface); border: 1px solid var(--color-neutral-400); border-radius: 7px; color: var(--color-text); }
  .pd-cost:focus-visible { outline: 2px solid var(--color-profit); outline-offset: 1px; }
  .tag { font-size: 11px; font-weight: 700; padding: 3px 10px; display: inline-block; letter-spacing: .01em; white-space: nowrap; border-radius: 999px; }
  .tag-accent { background: var(--color-accent-200); color: var(--color-accent-700); }
  .tag-neutral { background: var(--color-neutral-200); color: var(--color-neutral-700); }
  .plain-note { font-size: 10.5px; color: var(--color-neutral-600); margin-left: 6px; }
  .pd-caret { display: inline-block; width: 11px; font-size: 11px; color: var(--color-neutral-400); transition: transform .12s; }
  tr.pd-row.open .pd-caret { transform: rotate(90deg); }
  tr.pd-detail td { padding: 0 16px 18px; border-bottom: 1px solid var(--color-neutral-200); background: var(--color-surface-2); }
  .pd-detail-box { border: var(--border); border-radius: var(--radius-md); background: var(--color-surface); padding: 14px 16px; font-size: 12.5px; }
  .pd-detail-box table.detail-table { width: 100%; border-collapse: collapse; margin-top: 6px; }
  .pd-detail-box table.detail-table th { font-weight: 700; color: var(--color-neutral-600); text-align: left; padding: 4px 8px; font-size: 10px; text-transform: uppercase; letter-spacing: .03em; }
  .pd-detail-box table.detail-table td { padding: 6px 8px; border-bottom: 1px dotted var(--color-neutral-300); font-size: 12.5px; }
  .pd-detail-box table.detail-table td.r, .pd-detail-box table.detail-table th.r { text-align: right; }
  .pd-detail-box .future td { color: var(--color-neutral-600); font-style: italic; }
  .pd-costform { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--color-neutral-300); }
  .pd-field { display: flex; flex-direction: column; gap: 4px; }
  .pd-field label { font-size: 10px; font-weight: 700; color: var(--color-neutral-600); }
  .pd-field input { font-family: var(--mono); font-size: 12.5px; padding: 7px 9px; width: 118px; text-align: right; border: 1px solid var(--color-neutral-400); border-radius: 7px; font-variant-numeric: tabular-nums; background: var(--color-surface); color: var(--color-text); }
  .pd-field input:focus { outline: none; border-color: var(--color-profit); }
  .pd-savebtn { font-family: var(--font); font-size: 11.5px; font-weight: 700; padding: 8px 16px; border: none; border-radius: 7px; background: var(--color-text); color: #fff; cursor: pointer; transition: background .15s; }
  .pd-savebtn:hover:not(:disabled) { background: #000; }
  .pd-savebtn:disabled { opacity: .5; cursor: not-allowed; }
  .pd-toast { font-size: 11px; margin-top: 2px; min-height: 14px; color: var(--color-neutral-600); }
  .pd-toast.ok { color: var(--color-profit); font-weight: 700; }
  .pd-toast.bad { color: var(--color-loss); font-weight: 700; }
  .pd-note { font-size: 10.5px; color: var(--color-neutral-600); padding: 0 var(--space-6) var(--space-4); }

  /* ── 月度彙總 ── */
  h2.pd-section { font-size: 13px; font-weight: 800; letter-spacing: .02em; margin: var(--space-8) 0 var(--space-3); text-transform: uppercase; color: var(--color-neutral-700); }
  h2.pd-section .hint { font-weight: 500; text-transform: none; letter-spacing: 0; color: var(--color-neutral-600); font-size: 11.5px; }
  input.month-input { font-family: var(--mono); font-size: 12px; padding: 6px 8px; width: 96px; border: 1px solid var(--color-neutral-400); border-radius: 7px; text-align: right; font-variant-numeric: tabular-nums; background: var(--color-surface); color: var(--color-text); }
  input.month-input:focus { outline: none; border-color: var(--color-profit); }
  input.month-input.month { width: 122px; text-align: left; }
  button.month-save { font-family: var(--font); font-size: 11px; font-weight: 700; padding: 7px 13px; border: none; border-radius: 7px; background: var(--color-text); color: #fff; cursor: pointer; transition: background .15s; }
  button.month-save:hover:not(:disabled) { background: #000; }
  button.month-save:disabled { opacity: .5; cursor: not-allowed; }
  .month-flex { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .row-note { font-size: 10.5px; margin-top: 3px; color: var(--color-neutral-600); }
  .row-note.ok { color: var(--color-profit); font-weight: 700; }
  .row-note.bad { color: var(--color-loss); font-weight: 700; }

  footer.pd-src { font-size: 11px; color: var(--color-neutral-600); text-align: center; margin-top: var(--space-8); padding-top: var(--space-4); border-top: 1px solid var(--color-neutral-200); line-height: 1.8; }
  #loading, #empty { text-align: center; padding: 80px 0; color: var(--color-neutral-600); font-size: 14px; }

  .pd-demo-banner { background: var(--color-profit-bg); color: var(--color-profit); border: 1px solid #bfe3cd; border-radius: var(--radius-md); padding: 10px 16px; font-size: 12.5px; font-weight: 600; margin-bottom: var(--space-4); text-align: center; }

  /* ── 2a 強化：注意橫幅、KPI 趨勢、可排序欄頭、虧損標色 ── */
  .pd-alert { display: flex; align-items: center; gap: 12px; border-radius: var(--radius-md); padding: 13px 16px; margin-bottom: var(--space-4); font-size: 14px; font-weight: 600; line-height: 1.5; }
  .pd-alert .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .pd-alert b { font-weight: 800; }
  .pd-alert .go { margin-left: auto; white-space: nowrap; font-weight: 700; }
  .pd-alert.bad { background: var(--color-loss-bg); border: 1px solid #eec3b8; color: #8f2410; }
  .pd-alert.bad .dot { background: var(--color-loss); }
  .pd-alert.ok { background: var(--color-profit-bg); border: 1px solid #bfe3cd; color: var(--color-profit); }
  .pd-alert.ok .dot { background: var(--color-profit); }
  .pd-kpi .kpi-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .kpi-delta { font-size: 11px; font-weight: 700; white-space: nowrap; margin-top: 1px; }
  .kpi-delta.up { color: var(--color-profit); }
  .kpi-delta.down { color: var(--color-loss); }
  .kpi-delta.muted { color: var(--color-neutral-600); }
  .kpi-spark { width: 100%; height: 22px; margin-top: 10px; display: block; overflow: visible; }
  .pd-kpi .accent .kpi-delta.up { color: #7ee0a4; }
  .pd-kpi .accent .kpi-delta.down { color: #ffb4a2; }
  .pd-kpi .accent .kpi-delta.muted { color: rgba(255,255,255,.55); }
  table.pd-table thead th.sortable { cursor: pointer; user-select: none; }
  table.pd-table thead th.sortable:hover { color: var(--color-text); }
  .th-arrow { font-size: 9px; margin-left: 3px; color: var(--color-profit); }
  tr.pd-row.is-loss td { background: var(--color-loss-bg); }
  tr.pd-row.is-loss:hover td { background: #f7ddd4; }
  tr.pd-row.is-loss td:first-child { box-shadow: inset 3px 0 0 var(--color-loss); }
  tr.pd-row.is-below td:first-child { box-shadow: inset 3px 0 0 var(--color-neutral-400); }

  /* ── 手機：批次表轉成 1b 卡片流 ── */
  @media (max-width: 720px) {
    .pd-table-wrap { border: none; box-shadow: none; background: transparent; overflow: visible; }
    .pd-table-head { padding: 0 2px var(--space-3); border-bottom: none; }
    .pd-scroll { overflow-x: visible; }
    table.pd-table { min-width: 0; display: block; }
    table.pd-table thead { display: none; }
    table.pd-table tbody { display: block; }
    table.pd-table tr.pd-row { display: block; background: var(--color-surface); border: var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: 14px 16px; margin-bottom: 12px; }
    table.pd-table tr.pd-row:hover td { background: transparent; }
    table.pd-table tr.pd-row td { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 6px 0; border-bottom: none; text-align: right; }

      rows: mkRows([{ id: 'r9', date: '2026-07-03', store: '新莊宏匯店', boxes: 80, revenue: 210000, allocImport: 214000, allocLogistics: 19800, margin: -23800, isFuture: false, revenueSource: 'auto' }]) },
  ].map(b => {
    const cost = b.allocImport + b.allocLogistics;
    const margin = b.revenue - cost;
    return { ...b, margin, marginRate: b.revenue ? margin / b.revenue : 0 };
  });
  const months = [
    { month: '2026-05', boxes: 640, revenue: 1180000, importCost: 720000, logistics: 118000, logisticsFilled: true },
    { month: '2026-06', boxes: 820, revenue: 1520000, importCost: 940000, logistics: 152000, logisticsFilled: true },
    { month: '2026-07', boxes: 946, revenue: 1668000, importCost: 1152000, logistics: 0, logisticsFilled: false },
  ].map(m => { const margin = m.revenue - m.importCost - m.logistics; return { ...m, margin, marginRate: m.revenue ? margin / m.revenue : 0 }; });
  return {
    lastUpdated: new Date().toISOString(),
    fy: { batchesWithMissingCost: 1, monthsWithMissingLogistics: ['2026-07'] },
    batches, months,
    logisticsEntries: [{ month: '2026-05', sanyi: 72000, yuchu: 46000 }, { month: '2026-06', sanyi: 94000, yuchu: 58000 }],
  };
}

function fmt(n) { return Math.round(n || 0).toLocaleString('en-US'); }
function fmtSigned(n) { const r = Math.round(n || 0); return (r < 0 ? '-' : '') + 'NT$' + Math.abs(r).toLocaleString('en-US'); }
function pct(r) { return ((r || 0) * 100).toFixed(1) + '%'; }
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function marginColor(m) { return m < 0 ? 'var(--color-loss)' : 'var(--color-profit)'; }
// 數字輸入格：空白=null（清空），有值必須是 0 以上的數字，不合法丟錯不送出
function parseInputNum(el, label) {
  const v = el.value.trim().replace(/,/g, '');
  if (v === '') return null;
  const n = Number(v);
  if (!isFinite(n) || n < 0) throw new Error(t('errMustBeNonNeg', label));
  return n;
}
function formatClock(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '—';
  const p = n => String(n).padStart(2, '0');
  return p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
}
// 迷你趨勢線：把數列正規化到 viewBox 100x26
function sparkPoints(vals) {
  if (!vals || vals.length < 2) return '0,24 100,24';
  const min = Math.min(...vals), max = Math.max(...vals), span = (max - min) || 1;
  return vals.map((v, i) => {
    const x = (i / (vals.length - 1)) * 100;
    const y = 24 - ((v - min) / span) * 22;
    return x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ');
}
// 最新月 vs 前月 的變化標籤；goodUp=該指標往上是好事，isPt=以百分點顯示
function deltaChip(cur, prev, goodUp, isPt) {
  if (prev == null || !isFinite(prev)) return '';
  let diff;
  if (isPt) diff = (cur - prev) * 100;
  else { if (prev === 0) return ''; diff = (cur - prev) / Math.abs(prev) * 100; }
  const up = diff >= 0;
  const flat = Math.abs(diff) < 0.05;
  const cls = flat ? 'muted' : (up === goodUp ? 'up' : 'down');
  const arrow = flat ? '' : (up ? '▲ ' : '▼ ');
  return `<span class="kpi-delta ${cls}">${arrow}${Math.abs(diff).toFixed(1)}${isPt ? 'pt' : '%'} ${t('kpiVsPrev')}</span>`;
}

async function checkAuth() {
  try { const r = await fetch(API_BASE + '/api/auth'); const d = await r.json(); return !!d.ok; }
  catch { return false; }
}
async function doLogin() {
  const pw = document.getElementById('pwInput').value;
  const btn = document.getElementById('pwSubmit');
  const err = document.getElementById('pwErr');
  btn.disabled = true; err.textContent = '';
  try {
    const r = await fetch(API_BASE + '/api/auth', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ password: pw }) });
    const d = await r.json();
    if (d.ok) { showApp(); } else { err.textContent = d.error || '密碼錯誤'; }
  } catch { err.textContent = '連線失敗，請重試'; }
  finally { btn.disabled = false; }

function showApp() {
  document.getElementById('gate').style.display = 'none';

}

// ── 抓資料 ────────────────────────────────────────────────────────────────
async function loadData() {
  const refreshBtn = document.getElementById('refreshBtn');
  refreshBtn.disabled = true;
  refreshBtn.classList.add('spinning');
  document.getElementById('loading').style.display = 'block';
  document.getElementById('empty').style.display = 'none';
  document.getElementById('content').style.display = 'none';
  if (DEMO) {
    currentData = makeDemoData();
    render();
    refreshBtn.disabled = false;
    setTimeout(() => refreshBtn.classList.remove('spinning'), 500);
    return;
  }
  try {
    const r = await fetch(API_BASE + '/api/profit', { cache: 'no-store' });
    if (r.status === 401) { document.getElementById('gate').style.display = 'flex'; document.getElementById('app').style.display = 'none'; return; }
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || '讀取失敗');
    currentData = d;
    render();
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
    document.getElementById('empty').textContent = t('loadFailed') + e.message;
  } finally {
    refreshBtn.disabled = false;
    setTimeout(() => refreshBtn.classList.remove('spinning'), 500);
  }
}

// ── 分類／篩選／排序 ────────────────────────────────────────────────────────
// 批次狀態分類：對應狀態分頁（全部／出貨中／已完成／成本未填／未連結）
function catKey(b) {
  if (b.batchId === '__unlinked__') return 'unlinked';
  if (b.costStatus === 'none') return 'missing';
  const isDone = b.deliveryStatus === '全數出貨' || (b.shippedBoxes >= b.totalBoxes && b.totalBoxes > 0);
  if (isDone) return 'done';
  return 'shipping';
}
function catsList() {
  return [
    { key: 'all', label: t('catAll') },
    { key: 'shipping', label: t('catShipping') },
    { key: 'done', label: t('catDone') },
    { key: 'missing', label: t('catMissing') },
    { key: 'unlinked', label: t('catUnlinked') },
  ];
}
// baseVisible：目前「顯示未出貨批次」設定下，會出現在分頁計數/篩選裡的批次全集
function baseVisible(d) {
  return d.batches.filter(b => showInactive || b.shippedBoxes > 0 || b.futureBoxes > 0);
}
function sortBatches(list) {
  const arr = list.slice();
  if (sortMode === 'margin') arr.sort((a, b) => b.marginRate - a.marginRate);
  else if (sortMode === 'profit') arr.sort((a, b) => b.margin - a.margin);
  else arr.sort((a, b) => (b.ivName || '').localeCompare(a.ivName || ''));
  return arr;
}
function visibleBatches(d) {
  let list = baseVisible(d);
  if (currentCat !== 'all') list = list.filter(b => catKey(b) === currentCat);
  if (lossOnly) list = list.filter(b => b.margin < 0);
  return sortBatches(list);
}

// 頁首「注意」橫幅：直接點名虧損與成本未填的批次，主管不用自己找
function renderAlert(d) {
  const losses = d.batches.filter(b => b.batchId !== '__unlinked__' && b.shippedBoxes > 0 && b.margin < 0).sort((a, b) => a.margin - b.margin);
  const missing = d.batches.filter(b => b.batchId !== '__unlinked__' && b.costStatus === 'none');
  if (!losses.length && !missing.length) {
    return `<div class="pd-alert ok"><span class="dot"></span><span>${t('alertAllGood')}</span></div>`;
  }
  const parts = [];
  if (losses.length) {
    const names = losses.slice(0, 2).map(b => `${esc(b.productSummary || b.ivName)} ${fmtSigned(b.margin)}`).join('、');
    parts.push(`<b>${t('alertLossN', losses.length)}</b>（${names}${losses.length > 2 ? ' …' : ''}）`);
  }
  if (missing.length) parts.push(`<b>${t('alertMissN', missing.length)}</b>`);
  return `<div class="pd-alert bad"><span class="dot"></span><span>${t('alertPrefix')} ${parts.join('、')}${t('alertSuffix')}</span></div>`;
}

function renderBanners(d) {
  const rows = [];
  if (d.fy.batchesWithMissingCost > 0) {
    rows.push(`<div class="pd-todo-row"><span class="pd-todo-dot bad"></span><span><span class="pd-todo-tag">${t('tagMissingCost')}</span>${esc(t('missingCostMsg', d.fy.batchesWithMissingCost))}</span></div>`);
  }
  if (d.fy.monthsWithMissingLogistics.length > 0) {
    rows.push(`<div class="pd-todo-row"><span class="pd-todo-dot"></span><span><span class="pd-todo-tag">${t('tagMissingLogistics')}</span>${esc(t('missingLogisticsMsg', d.fy.monthsWithMissingLogistics.map(esc).join('、')))}</span></div>`);
  }
  const orphan = d.batches.find(b => b.batchId === '__unlinked__');
  if (orphan) {
    rows.push(`<div class="pd-todo-row"><span class="pd-todo-dot"></span><span><span class="pd-todo-tag">${t('tagUnlinked')}</span>${esc(t('unlinkedMsg', orphan.rows.length))}</span></div>`);
  }
  if (!rows.length) return '';
  return `<div class="pd-todo"><div class="pd-todo-title">${t('todoTitle')}</div>${rows.join('')}</div>`;
}

// KPI 一律統計全部批次（不受篩選影響）；附月度趨勢線與「最新月 vs 前月」變化
function renderKPI(d) {
  const all = d.batches;
  const totalRevenue = all.reduce((s, b) => s + b.revenue, 0);
  const totalCost = all.reduce((s, b) => s + b.allocImport + b.allocLogistics, 0);
  const totalProfit = totalRevenue - totalCost;
  const avgMargin = totalRevenue ? (totalProfit / totalRevenue * 100) : 0;
  const lossCount = all.filter(b => b.shippedBoxes > 0 && b.margin < 0).length;
  const ms = (d.months || []).slice().sort((a, b) => a.month.localeCompare(b.month));
  const rev = ms.map(m => m.revenue), cost = ms.map(m => (m.importCost || 0) + (m.logistics || 0));
  const prof = ms.map(m => m.margin), rate = ms.map(m => m.marginRate);
  const L = ms.length - 1, P = ms.length - 2, has2 = ms.length >= 2;
  const card = (label, value, sub, series, sparkColor, valColor, delta, accent) =>
    `<div${accent ? ' class="accent"' : ''}><div class="kpi-top"><div class="lbl">${label}</div>${delta || ''}</div>` +
    `<div class="val num"${(!accent && valColor) ? ` style="color:${valColor}"` : ''}>${value}</div>` +
    `<div class="sub">${sub}</div>` +
    `<svg class="kpi-spark" viewBox="0 0 100 26" preserveAspectRatio="none"><polyline points="${sparkPoints(series)}" fill="none" stroke="${sparkColor}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"></polyline></svg></div>`;
  const green = 'var(--color-profit)', muted = 'var(--color-neutral-400)';
  return `<div class="pd-kpi">
    ${card(t('kpiTotalRevenue'), 'NT$ ' + fmt(totalRevenue), t('kpiBatchesUnit', all.length), rev, muted, null, has2 ? deltaChip(rev[L], rev[P], true, false) : '', false)}
    ${card(t('kpiTotalCost'), 'NT$ ' + fmt(totalCost), t('kpiCostConverted'), cost, muted, null, has2 ? deltaChip(cost[L], cost[P], false, false) : '', false)}
    ${card(t('kpiTotalProfit'), 'NT$ ' + fmt(totalProfit), t('kpiIncludesShipping'), prof, '#7ee0a4', null, has2 ? deltaChip(prof[L], prof[P], true, false) : '', true)}
    ${card(t('kpiAvgMargin'), avgMargin.toFixed(1) + '%', t('kpiLossCount', lossCount), rate, green, green, has2 ? deltaChip(rate[L], rate[P], true, true) : '', false)}
  </div>`;
}

// 月度毛利率趨勢：由舊到新排列，方便看走勢；沒出貨（營收為0）的月份不畫
function renderMonthTrend(d) {
  const el = document.getElementById('monthTrend');
  if (!el) return;
  const months = d.months.filter(m => m.revenue > 0).slice().sort((a, b) => a.month.localeCompare(b.month));
  if (!months.length) { el.innerHTML = `<div class="pd-empty-note">${t('noMonthData')}</div>`; return; }
  const maxAbs = Math.max(1, ...months.map(m => Math.abs(m.marginRate)));
  const targetLeft = Math.min(100, TARGET_RATE / maxAbs * 100);
  const bars = months.map(m => {
    const barPct = Math.max(2, Math.abs(m.marginRate) / maxAbs * 100);
    const color = marginColor(m.margin);
    return `<div class="pd-bar-row"><div class="pd-bar-name">${esc(m.month)}</div>
      <div class="pd-bar-track"><div class="pd-bar-fill" style="width:${barPct}%;background:${color};"></div><div style="position:absolute;top:-3px;bottom:-3px;left:${targetLeft}%;width:0;border-left:2px dashed var(--color-profit);"></div></div>
      <div class="pd-bar-val num" style="color:${color};">${pct(m.marginRate)}</div></div>`;
  }).join('');
  el.innerHTML = `<div style="font-size:11px;color:var(--color-profit);font-weight:600;margin-bottom:12px;">- - ${t('kpiTarget')} ${(TARGET_RATE * 100).toFixed(0)}%</div>` + bars;
}
function renderVisual(d) {
  const list = visibleBatches(d).filter(b => b.shippedBoxes > 0); // 尚未出貨的批次沒有意義的毛利可畫
  const chartSrc = list.slice().sort((a, b) => b.margin - a.margin);
  const maxAbs = Math.max(1, ...chartSrc.map(b => Math.abs(b.margin)));
  const top = chartSrc.slice(0, 7);
  document.getElementById('chartBars').innerHTML = top.length ? top.map(b => {
    const barPct = Math.max(2, Math.abs(b.margin) / maxAbs * 100);
    const color = marginColor(b.margin);
    const name = esc(b.productSummary || b.ivName);
    return `<div class="pd-bar-row"><div class="pd-bar-name" title="${name}">${name}</div>
      <div class="pd-bar-track"><div class="pd-bar-fill" style="width:${barPct}%;background:${color};"></div></div>
      <div class="pd-bar-val num" style="color:${color};">${fmtSigned(b.margin)}</div></div>`;
  }).join('') : `<div class="pd-empty-note">${t('noBatchInCat')}</div>`;

  const buckets = [
    { label: t('bucket40'), test: m => m >= 0.40, color: 'var(--color-profit)' },
    { label: t('bucket20_40'), test: m => m >= 0.20 && m < 0.40, color: '#3ba776' },
    { label: t('bucket0_20'), test: m => m >= 0 && m < 0.20, color: 'var(--color-neutral-400)' },
    { label: t('bucketLoss'), test: m => m < 0, color: 'var(--color-loss)' },
  ];
  const denom = Math.max(1, list.length);
  document.getElementById('bucketChart').innerHTML = buckets.map(b => {
    const count = list.filter(x => b.test(x.marginRate)).length;
    const p = count / denom * 100;
    return `<div class="pd-bucket"><div class="pd-bucket-head"><span>${b.label}</span><span class="cnt num">${t('countUnit', count)}</span></div>
      <div class="pd-bucket-track"><div class="pd-bucket-fill" style="width:${p}%;background:${b.color};"></div></div></div>`;
  }).join('');
}

function batchStatusHtml(b) {
  if (b.batchId === '__unlinked__') {
    let html = `<span class="tag tag-accent">${t('tagUnlinked')}</span>`;
    if (b.missingPriceRows > 0) html += `<span class="plain-note">${t('missingPriceNote', b.missingPriceRows)}</span>`;
    return html;
  }
  let chip;
  const isDone = b.deliveryStatus === '全數出貨' || (b.shippedBoxes >= b.totalBoxes && b.totalBoxes > 0);
  if (b.costStatus === 'none') chip = `<span class="tag tag-accent">${t('tagMissingCost')}</span>`;
  else if (b.costStatus === 'partial') chip = `<span class="tag tag-accent">${t('tagCostPartial')}</span>`;

            <td class="r num" data-label="${t('colMargin')}" style="font-weight:800;color:${color};">${noData ? '－' : fmtSigned(b.margin)}</td>
            <td class="r num" data-label="${t('colMarginRate')}" style="font-weight:700;color:${color};">${noData ? '－' : pct(b.marginRate)}</td>

      }).join('')}</tbody>
    </table></div>

  </div>`;
}

function bindSortHeaders() {

function storeOptionsHtml(selected) {
  const list = STORES.includes(selected) || !selected ? STORES : [selected, ...STORES];
  return list.map(s => `<option value="${esc(s)}"${s===selected?' selected':''}>${esc(s)}</option>`).join('');
}
function batchOptionsHtml(selected) {
  const real = (currentData.batches || []).filter(bat => bat.batchId !== '__unlinked__');
  const opts = real.map(bat => {
    const label = esc(bat.ivName) + (bat.productSummary ? '－' + esc(bat.productSummary) : '');
    return `<option value="${esc(bat.batchId)}"${bat.batchId===selected?' selected':''}>${label}</option>`;
  }).join('');
  return `<option value="">${esc(t('selectBatchPlaceholder'))}</option>${opts}`;
}

// 通用：更新既有出貨紀錄（PUT /api/records/:id），也用在「缺單價」補金額
async function saveRecordFields(id, payload, btn, noteEl) {
  btn.disabled = true;
  noteEl.textContent = t('savingMsg'); noteEl.className = 'pd-toast';
  try {
    const r = await fetch(API_BASE + '/api/records/' + id, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
    });
    if (!r.ok) { const resp = await r.json().catch(() => ({})); throw new Error(resp.error || '存檔失敗'); }
    noteEl.textContent = t('savedNote'); noteEl.className = 'pd-toast ok';
    await loadData();
  } catch (err) {
    noteEl.textContent = t('saveFailedPrefix') + err.message; noteEl.className = 'pd-toast bad'; btn.disabled = false;
  }
}
// 通用：「拆成兩筆」存成全新記錄（POST /api/records）
async function createRecordFields(payload, btn, noteEl) {
  btn.disabled = true;

    });

  } catch (err) {

function readEditableRow(tr) {

function bindUnlinkedEditableTable() {
  const table = document.getElementById('unlinkedEditTable');
  if (!table) return;
  table.querySelectorAll('.rec-save').forEach(btn => {
    if (btn.dataset.bound) return;
    btn.dataset.bound = '1';
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const tr = btn.closest('tr');
      const recId = tr.dataset.recId;
      const noteEl = tr.nextElementSibling.querySelector('.rec-note');
      const vals = readEditableRow(tr);
      let payload;
      try {
        payload = { store: vals.store, date: vals.date, boxes: parseInputNum({ value: vals.boxes }, t('detailBoxes')), amount: parseInputNum({ value: vals.amount }, t('fieldAmount')) };
        if (vals.batchId) payload.batchId = vals.batchId;
      } catch (err) { noteEl.textContent = err.message; noteEl.className = 'pd-toast bad'; return; }
      await saveRecordFields(recId, payload, btn, noteEl);
    });
  });
  table.querySelectorAll('.rec-split').forEach(btn => {
    if (btn.dataset.bound) return;
    btn.dataset.bound = '1';
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const tr = btn.closest('tr');
      const vals = readEditableRow(tr);
      const draftId = 'draft-' + (draftSeq++);
      const draftRow = document.createElement('tr');
      draftRow.dataset.draftId = draftId;
      draftRow.innerHTML = `
        <td><input class="rec-date" type="date" value="${esc(vals.date || '')}"></td>
        <td><select class="rec-store">${storeOptionsHtml(vals.store)}</select></td>
        <td class="r"><input class="rec-boxes num" type="number" inputmode="numeric" placeholder="0" style="width:70px;text-align:right;"></td>
        <td class="r"><input class="rec-amount num" type="number" inputmode="decimal" placeholder="0" style="width:96px;text-align:right;"></td>
        <td><select class="rec-batch">${batchOptionsHtml('')}</select></td>
        <td class="r" style="white-space:nowrap;">
          <button class="pd-savebtn rec-create">${t('saveBtn')}</button>
          <button class="pd-savebtn rec-cancel" style="background:var(--color-surface);color:var(--color-text);border:1px solid var(--color-neutral-400);">${t('cancelBtn')}</button>
        </td>`;
      const noteRow = document.createElement('tr');
      noteRow.className = 'rec-note-row';
      noteRow.innerHTML = `<td colspan="6"><div class="pd-toast rec-note">${esc(t('newRecordTitle'))}</div></td>`;
      tr.nextElementSibling.after(draftRow, noteRow);
      draftRow.querySelector('.rec-cancel').addEventListener('click', (ev) => { ev.stopPropagation(); draftRow.remove(); noteRow.remove(); });
      draftRow.querySelector('.rec-create').addEventListener('click', async (ev) => {
        ev.stopPropagation();
        const dv = readEditableRow(draftRow);
        const noteEl = noteRow.querySelector('.rec-note');
        if (!dv.batchId) { noteEl.textContent = t('selectBatchPlaceholder'); noteEl.className = 'pd-toast bad'; return; }
        let payload;
        try {
          payload = { batchId: dv.batchId, store: dv.store, date: dv.date, boxes: parseInputNum({ value: dv.boxes }, t('detailBoxes')), amount: parseInputNum({ value: dv.amount }, t('fieldAmount')) };
        } catch (err) { noteEl.textContent = err.message; noteEl.className = 'pd-toast bad'; return; }
        await createRecordFields(payload, ev.currentTarget, noteEl);
      });
    });
  });
}

      <td class="r num">${fmt(s.boxes)}</td>
      <td class="r num">${revenueCell}</td>
      <td class="r num">${s.isFuture ? '—' : fmt(s.allocImport)}</td>

  }).join('');

  const costNote = t('costNoteTpl', fmt(b.shiireTwd), fmt(b.tariffCustoms), fmt(b.miscFee), fmt(b.costFull), fmt(b.shippedBoxes), fmt(b.totalBoxes));
  const costFormHtml = `
    <div class="pd-costform" data-batch-idx="__idx__">
      <div class="pd-field"><label>${t('fieldShiire')}</label><input class="cf-shiire" inputmode="decimal" placeholder="${t('notFilled')}"></div>
      <div class="pd-field"><label>${t('fieldTariff')}</label><input class="cf-tariff" inputmode="decimal" placeholder="${t('notFilled')}"></div>
      <div class="pd-field"><label>${t('fieldMisc')}</label><input class="cf-misc" inputmode="decimal" placeholder="${t('notFilled')}"></div>
      <button class="pd-savebtn cf-save">${t('saveBtn')}</button>
      <div class="pd-toast cf-note">${esc(costNote)}</div>
    </div>`;
  return `<div class="pd-detail-box">
    ${hasMissingPrice ? `<div class="pd-note" style="padding:0 0 8px;">${esc(t('missingPriceEditHint'))}</div>` : ''}
    <table class="detail-table">
      <thead><tr>
        <th>${t('detailShipDate')}</th><th>${t('detailStore')}</th><th class="r">${t('detailBoxes')}</th><th class="r">${t('detailRevenue')}</th>
        <th class="r">${t('detailAllocImport')}</th><th class="r">${t('detailAllocLogistics')}</th><th class="r">${t('detailMargin')}</th>
      </tr></thead><tbody>${subRows || `<tr><td colspan="7">${t('detailNoRecords')}</td></tr>`}</tbody>

function bindMissingPriceInputs() {
  document.querySelectorAll('.rec-price-save').forEach(btn => {
    if (btn.dataset.bound) return;
    btn.dataset.bound = '1';
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const input = document.querySelector(`.rec-amount[data-id="${id}"]`);
      const noteEl = document.querySelector(`.rec-note[data-note-for="${id}"]`);
      let amount;
      try { amount = parseInputNum(input, t('fieldAmount')); }
      catch (err) { noteEl.textContent = err.message; noteEl.className = 'pd-toast bad'; return; }

      await saveRecordFields(id, { amount }, btn, noteEl);

function toggleBatchRow(idx) {
  const row = document.querySelector(`tr.pd-row[data-idx="${idx}"]`);
  const expandRow = document.querySelector(`tr.pd-detail[data-expand="${idx}"]`);
  const isOpen = row.classList.contains('open');
  document.querySelectorAll('tr.pd-row.open').forEach(r => r.classList.remove('open'));
  document.querySelectorAll('tr.pd-detail').forEach(r => { r.style.display = 'none'; r.querySelector('td').innerHTML = ''; });
  if (isOpen) return;

  row.classList.add('open');
  const b = visibleBatches(currentData)[idx];
  const isUnlinked = b.batchId === '__unlinked__';
  expandRow.querySelector('td').innerHTML = isUnlinked ? renderUnlinkedEditableTable(b) : renderNormalDetailTable(b).replace('__idx__', idx);
  expandRow.style.display = 'table-row';
  if (isUnlinked) bindUnlinkedEditableTable();
  else { bindMissingPriceInputs(); bindCostForms(); }
}

function bindCostForms() {
  document.querySelectorAll('.pd-costform').forEach(form => {
    if (form.dataset.bound) return;
    form.dataset.bound = '1';
    const idx = Number(form.dataset.batchIdx);
    const b = visibleBatches(currentData)[idx];
    const shiireEl = form.querySelector('.cf-shiire');
    const tariffEl = form.querySelector('.cf-tariff');
    const miscEl = form.querySelector('.cf-misc');
    if (b.shiireJpyRaw != null) shiireEl.value = String(b.shiireJpyRaw);
    if (b.tariffCustomsRaw != null) tariffEl.value = String(b.tariffCustomsRaw);
    if (b.miscFeeRaw != null) miscEl.value = String(b.miscFeeRaw);
    const btn = form.querySelector('.cf-save');
    const note = form.querySelector('.cf-note');
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      let payload;
      try {
        payload = {
          batchId: b.batchId,
          shiireJpy: parseInputNum(shiireEl, t('errShiireLabel')),
          tariffCustoms: parseInputNum(tariffEl, t('errTariffLabel')),
          miscFee: parseInputNum(miscEl, t('errMiscLabel')),
        };
      } catch (err) { note.textContent = err.message; note.className = 'pd-toast cf-note bad'; return; }
      btn.disabled = true;
      note.textContent = t('savingMsg'); note.className = 'pd-toast cf-note';
      try {
        const r = await fetch(API_BASE + '/api/profit/costs', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
        });

        if (!r.ok) throw new Error(resp.error || '存檔失敗');
        note.textContent = t('savedOkMsg'); note.className = 'pd-toast cf-note ok';
        await loadData();
      } catch (err) {
        note.textContent = t('saveFailedPrefix') + err.message; note.className = 'pd-toast cf-note bad';
        btn.disabled = false;
      }

}

// ── 月度彙總＋物流輸入 ────────────────────────────────────────────────────
function renderMonthTable(d) {
  const byMonth = new Map();
  for (const m of d.months) byMonth.set(m.month, { ...m });
  for (const l of d.logisticsEntries) {
    if (!byMonth.has(l.month)) byMonth.set(l.month, { month: l.month, boxes: 0, revenue: 0, importCost: 0, logistics: (l.sanyi||0)+(l.yuchu||0), logisticsFilled: true, margin: 0, marginRate: 0 });
  }
  const logByMonth = new Map(d.logisticsEntries.map(l => [l.month, l]));
  const months = [...byMonth.values()].sort((a, b) => b.month.localeCompare(a.month));

  const rows = months.map((m, i) => {
    const log = logByMonth.get(m.month);
    const sanyiVal = log && log.sanyi != null ? String(log.sanyi) : '';
    const yuchuVal = log && log.yuchu != null ? String(log.yuchu) : '';
    const color = m.revenue > 0 ? marginColor(m.margin) : 'var(--color-text)';
    return `<tr>
      <td class="num" data-label="${t('colMonth')}">${esc(m.month)}</td>
      <td class="r num" data-label="${t('colBoxes')}">${fmt(m.boxes)}</td>
      <td class="r num" data-label="${t('colRevenue2')}">${fmt(m.revenue)}</td>
      <td class="r num" data-label="${t('colImportAlloc')}">${fmt(m.importCost)}</td>
      <td data-label="${t('colLogistics')}">
        <div class="month-flex">
          <input class="month-input lg-sanyi" data-m="${i}" inputmode="decimal" placeholder="三義" value="${esc(sanyiVal)}">
          <input class="month-input lg-yuchu" data-m="${i}" inputmode="decimal" placeholder="優儲" value="${esc(yuchuVal)}">
          <button class="month-save lg-save" data-m="${i}" data-month="${esc(m.month)}">${t('saveShort')}</button>
        </div>
        <div class="row-note lg-note" data-m="${i}">${m.logisticsFilled ? '' : t('logisticsUnfilledNote')}</div>
      </td>
      <td class="r num" data-label="${t('colMargin')}" style="color:${color};font-weight:800;">${m.revenue > 0 ? fmtSigned(m.margin) : '－'}</td>
      <td class="r num" data-label="${t('colMarginRate')}" style="color:${color};font-weight:700;">${m.revenue > 0 ? pct(m.marginRate) : '－'}</td>
    </tr>`;
  }).join('');

  return `<h2 class="pd-section">${t('monthSectionTitle')}<span class="hint"> ${t('monthSectionHint')}</span></h2>
    <div class="pd-table-wrap"><div class="pd-scroll"><table class="pd-table">
      <thead><tr>
        <th>${t('colMonth')}</th><th class="r">${t('colBoxes')}</th><th class="r">${t('colRevenue2')}</th><th class="r">${t('colImportAlloc')}</th>
        <th>${t('colLogistics')}</th><th class="r">${t('colMargin')}</th><th class="r">${t('colMarginRate')}</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tbody><tr>
        <td colspan="7" style="padding:12px 16px;">
          <div class="month-flex" style="font-size:12px;color:var(--color-neutral-600);">
            ${t('addOtherMonth')}
            <input class="month-input month" id="newLogMonth" type="month">
            <input class="month-input" id="newLogSanyi" inputmode="decimal" placeholder="三義">
            <input class="month-input" id="newLogYuchu" inputmode="decimal" placeholder="優儲">
            <button class="month-save" id="newLogSave">${t('saveShort')}</button>
            <span class="row-note" id="newLogNote"></span>
          </div>
        </td>
      </tr></tbody>
    </table></div></div>`;
}

async function saveLogistics(month, sanyiEl, yuchuEl, btn, noteEl) {
  let sanyi, yuchu;
  try {
    sanyi = parseInputNum(sanyiEl, t('errSanyiLabel'));
    yuchu = parseInputNum(yuchuEl, t('errYuchuLabel'));
  } catch (err) { noteEl.textContent = err.message; noteEl.classList.add('bad'); return; }
  btn.disabled = true;
  noteEl.className = noteEl.className.replace(/\b(ok|bad)\b/g, '').trim();
  noteEl.textContent = t('savingMsg');
  try {
    const r = await fetch(API_BASE + '/api/profit/logistics', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ month, sanyi, yuchu }),
    });
    const resp = await r.json();
    if (!r.ok) throw new Error(resp.error || '存檔失敗');
    noteEl.textContent = t('savedNote'); noteEl.classList.add('ok');
    await loadData();
  } catch (err) {
    noteEl.textContent = t('saveFailedPrefix') + err.message; noteEl.classList.add('bad');
    btn.disabled = false;
  }
}

function bindLogisticsRows() {
  document.querySelectorAll('button.lg-save').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = btn.dataset.m;
      saveLogistics(
        btn.dataset.month,
        document.querySelector(`input.lg-sanyi[data-m="${i}"]`),
        document.querySelector(`input.lg-yuchu[data-m="${i}"]`),
        btn,
        document.querySelector(`.lg-note[data-m="${i}"]`),
      );
    });
  });
  const newSave = document.getElementById('newLogSave');
  if (newSave) newSave.addEventListener('click', () => {
    const month = document.getElementById('newLogMonth').value;
    const note = document.getElementById('newLogNote');
    if (!/^\d{4}-\d{2}$/.test(month)) { note.textContent = t('pleaseSelectMonth'); note.classList.add('bad'); return; }
    saveLogistics(month, document.getElementById('newLogSanyi'), document.getElementById('newLogYuchu'), newSave, note);
  });
}

// ── 啟動 ──────────────────────────────────────────────────────────────────
applyStaticTranslations();
bindLangSeg();
document.getElementById('pwSubmit').addEventListener('click', doLogin);
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('refreshBtn').addEventListener('click', loadData);

(async function init() {
  if (DEMO) { showApp(); return; }
  const authed = await checkAuth();
  if (authed) showApp();
})();
</script>
