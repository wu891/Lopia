<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOPIA 批次即時毛利</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Lora:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── 2026-07-17 改版：依「Classical」設計交付包重製視覺（暖灰底＋金色強調＋
     Cormorant Garamond/Lora）。資料來源、密碼驗證、成本／物流寫入邏輯完全不動，
     只換「拿到資料之後怎麼畫」。中文沿用 Noto Serif/Sans TC 當後備字體，
     因為 Cormorant/Lora 本身不含中文字glyph。 */
  :root {
    --bg: #f3f2f2; --surface: #eae9e9; --surface-2: #ffffff; --text: #201f1d;
    --text-muted: rgba(32,31,29,.55); --text-faint: rgba(32,31,29,.42);
    --divider: rgba(32,31,29,.16); --divider-strong: rgba(32,31,29,.28);
    --gold: #b68235; --gold-deep: #7d5411; --gold-bg: rgba(182,130,53,.14);
    --neutral: #605d5d; --neutral-bg: rgba(32,31,29,.06);
    --loss: #a8432c; --loss: oklch(0.52 0.15 32); --loss-bg: rgba(168,67,44,.12);
    --font-heading: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif;
    --font-body: 'Lora', 'Noto Sans TC', -apple-system, sans-serif;
    --radius-card: 4px; --radius-lg: 7px;
    --shadow-sm: 0 1px 2px rgba(45,43,43,.14);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }
  .heading { font-family: var(--font-heading); }
  .num { font-family: var(--font-body); font-feature-settings: 'tnum'; font-variant-numeric: tabular-nums; }
  a, button, input, [tabindex] { }
  :focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  @keyframes livepulse { 0%,100% { opacity:.35; transform:scale(.8); } 50% { opacity:1; transform:scale(1); } }

  /* ── 密碼閘門 ── */
  #gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
  #gate .box { background: var(--surface-2); border: 1px solid var(--divider); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 44px 40px; width: 320px; text-align: center; }
  #gate .rule { width: 40px; height: 3px; background: var(--gold); margin: 0 auto 18px; border-radius: 2px; }
  #gate h1 { font-family: var(--font-heading); font-size: 22px; font-weight: 600; margin-bottom: 8px; }
  #gate p { font-size: 12.5px; color: var(--text-muted); margin-bottom: 24px; }
  #gate input {
    width: 100%; padding: 11px 13px; border: none; border-bottom: 1.5px solid var(--divider-strong);
    background: transparent; font-family: var(--font-body); font-size: 14px; margin-bottom: 14px; text-align: center; color: var(--text);
  }
  #gate input:focus { outline: none; border-bottom-color: var(--gold); }
  #gate button {
    width: 100%; padding: 11px; border: 1.5px solid var(--text); border-radius: 2px; background: var(--text);
    color: var(--surface-2); font-family: var(--font-body); font-weight: 700; font-size: 13.5px; letter-spacing: 0.5px; cursor: pointer;
  }
  #gate button:hover:not(:disabled) { background: var(--gold-deep); border-color: var(--gold-deep); }
  #gate button:disabled { opacity: 0.5; cursor: not-allowed; }
  #gate .err { color: var(--loss); font-size: 12px; margin-top: 12px; min-height: 16px; font-weight: 600; }

  /* ── 主畫面 ── */
  #app { display: none; }
  .nav {
    position: sticky; top: 0; z-index: 5; background: color-mix(in srgb, var(--bg) 92%, transparent);
    background: rgba(243,242,242,.92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--divider);
    display: flex; align-items: center; justify-content: space-between; padding: 14px 28px;
  }
  .nav-brand { display: flex; align-items: baseline; gap: 10px; font-family: var(--font-heading); font-weight: 600; font-size: 19px; }
  .nav-brand .sub { font-family: var(--font-body); font-weight: 400; font-size: 13px; letter-spacing: .02em; color: var(--text-muted); }
  .nav-live { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }
  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); animation: livepulse 1.6s ease-in-out infinite; flex-shrink: 0; }
  button.refresh {
    display: flex; align-items: center; gap: 6px; font-family: var(--font-body); font-size: 12.5px; font-weight: 600;
    background: none; border: 1px solid var(--divider-strong); color: var(--text); padding: 8px 14px; border-radius: 2px; cursor: pointer;
    margin-left: 14px;
  }
  button.refresh:hover:not(:disabled) { border-color: var(--gold); color: var(--gold-deep); }
  button.refresh:disabled { opacity: .5; cursor: not-allowed; }
  button.refresh svg { transition: transform .5s ease; }
  button.refresh.spinning svg { transform: rotate(360deg); }

  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 28px 100px; }

  /* ── 主摘要橫幅 ── */
  .hero {
    display: grid; grid-template-columns: 1.4fr 1px 1fr 1px 1fr 1px 1fr; align-items: stretch;
    border: 1px solid var(--divider); border-radius: var(--radius-lg); background: var(--surface);
    box-shadow: var(--shadow-sm); overflow: hidden; margin-bottom: 28px;
  }
  .hero .div { background: var(--divider); }
  .hero .cell { padding: 18px 24px; display: flex; flex-direction: column; justify-content: center; gap: 6px; }
  .hero .cell.main { padding: 18px 28px; }
  .hero .label { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); }
  .hero .cell.main .label { color: var(--gold-deep); }
  .hero .big { font-family: var(--font-heading); font-weight: 400; font-size: 76px; line-height: .9; font-feature-settings: 'tnum'; }
  .hero .big-row { display: flex; align-items: baseline; gap: 6px; }
  .hero .cell.main .big-row .pct { font-size: 26px; }
  .hero .mid { font-family: var(--font-heading); font-size: 34px; line-height: 1; font-feature-settings: 'tnum'; }
  .hero .note { font-size: 11.5px; color: var(--text-muted); }
  .hero .note.dim { font-size: 11px; color: var(--text-faint); margin-top: 1px; }
  .hero .bar-track { height: 4px; border-radius: 2px; background: rgba(32,31,29,.12); overflow: hidden; margin: 2px 0; }
  .hero .bar-fill { height: 100%; background: var(--gold); }

  .tone-loss { color: var(--loss) !important; }
  .tone-thin { color: var(--neutral) !important; }
  .tone-healthy { color: var(--gold-deep) !important; }

  /* ── 控制列 ── */
  .controls-row { display: flex; align-items: center; gap: 18px; margin: 0 0 10px; flex-wrap: wrap; }
  .chk-label { display: flex; align-items: center; gap: 7px; font-size: 13px; cursor: pointer; user-select: none; }
  .chk-label input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--gold-deep); cursor: pointer; }
  button.toggle-link {
    font-family: var(--font-body); background: none; border: 1px solid var(--divider-strong); color: var(--text-muted);
    font-size: 12.5px; font-weight: 600; cursor: pointer; padding: 7px 13px; border-radius: 2px;
  }
  button.toggle-link:hover { border-color: var(--gold); color: var(--gold-deep); }
  .sort-wrap { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .sort-wrap .lbl { font-size: 12px; color: var(--text-muted); }
  .seg { display: flex; border: 1px solid var(--divider-strong); border-radius: 3px; overflow: hidden; }
  .seg button {
    font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--text-muted); background: var(--surface-2);
    border: none; border-left: 1px solid var(--divider); padding: 6px 12px; cursor: pointer;
  }
  .seg button:first-child { border-left: none; }
  .seg button.active { background: var(--gold-deep); color: var(--surface-2); }
  .helper-text { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }

  /* ── 提醒橫幅 ── */
  .banner { font-size: 13px; padding: 10px 14px; border-left: 3px solid var(--gold); background: var(--gold-bg); border-radius: 2px; line-height: 1.7; margin-bottom: 8px; }
  .banner.bad { border-left-color: var(--loss); background: var(--loss-bg); }
  .banner .tag { font-weight: 700; color: var(--gold-deep); margin-right: 6px; }
  .banner.bad .tag { color: var(--loss); }

  h2.section {
    font-family: var(--font-body); font-size: 12px; font-weight: 700; letter-spacing: 1px; color: var(--text-muted);
    margin: 34px 0 8px; text-transform: uppercase;
  }
  h2.section .hint { font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--text-faint); font-size: 11.5px; }

  /* ── 表格 ── */
  .card-table { border: 1px solid var(--divider); border-radius: var(--radius-lg); overflow: hidden; background: var(--surface); }
  table.data-table { width: 100%; border-collapse: collapse; }
  table.data-table thead th {
    text-align: left; font-size: 10.5px; font-weight: 700; color: var(--text-muted);
    padding: 10px 14px; border-bottom: 1px solid var(--divider-strong); text-transform: uppercase; letter-spacing: .04em;
    background: var(--surface);
  }
  table.data-table td.num, table.data-table th.num { text-align: right; }
  table.data-table tbody td { padding: 14px; border-bottom: 1px solid var(--divider); font-size: 14px; vertical-align: top; background: var(--surface); }
  table.data-table tr.batch-row { cursor: pointer; transition: background .15s; }
  table.data-table tr.batch-row:hover td { background: rgba(32,31,29,.04); }
  table.data-table tr.batch-row.muted td { color: var(--text-muted); }
  .caret { display: inline-block; width: 12px; color: var(--text-faint); transition: transform .12s; }
  tr.batch-row.open .caret { transform: rotate(90deg); }
  .product-name { font-family: var(--font-heading); font-size: 16px; line-height: 1.2; font-weight: 500; }
  .product-meta { font-size: 11px; color: var(--text-faint); margin-top: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .ship-line { font-size: 13px; }
  .mini-bar-track { height: 4px; border-radius: 2px; background: rgba(32,31,29,.12); overflow: hidden; margin-top: 5px; max-width: 110px; }
  .mini-bar-fill { height: 100%; background: var(--gold); }
  .margin-rate { font-family: var(--font-heading); font-size: 19px; font-weight: 500; }

  .pill { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px; white-space: nowrap; letter-spacing: .02em; }
  .pill.outline-gold { border: 1px solid rgba(125,84,17,.4); color: var(--gold-deep); background: transparent; }
  .pill.outline-neutral { border: 1px solid var(--divider-strong); color: var(--text-muted); background: transparent; }
  .pill.fill-loss { background: var(--loss-bg); color: var(--loss); }
  .pill.fill-gold { background: var(--gold-bg); color: var(--gold-deep); }
  .pill.fill-neutral { background: var(--neutral-bg); color: var(--neutral); }

  tr.expand-row td { background: rgba(32,31,29,.03); padding: 6px 14px 20px; }
  tr.expand-row .detail-table { width: 100%; font-size: 12.5px; margin-top: 6px; border-collapse: collapse; }
  tr.expand-row .detail-table th { font-weight: 600; color: var(--text-muted); text-align: left; padding: 4px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: .03em; }
  tr.expand-row .detail-table td { padding: 6px 10px; border-bottom: 1px dotted var(--divider-strong); font-size: 13px; }
  tr.expand-row .detail-table td.num, tr.expand-row .detail-table th.num { text-align: right; }
  tr.expand-row .future td { color: var(--text-faint); font-style: italic; }

  .cost-form { margin-top: 14px; padding: 14px; background: var(--surface-2); border: 1px solid var(--divider); border-radius: var(--radius-card); display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end; }
  .cost-form .field { display: flex; flex-direction: column; gap: 3px; }
  .cost-form label { font-size: 10.5px; font-weight: 700; color: var(--text-muted); letter-spacing: .02em; }
  .cost-form input {
    font-family: var(--font-body); font-feature-settings: 'tnum'; font-size: 13px; padding: 7px 9px; width: 130px;
    border: 1px solid var(--divider-strong); border-radius: 2px; background: #fff; text-align: right; color: var(--text);
  }
  .cost-form input:focus { outline: none; border-color: var(--gold); }
  .cost-form button {
    font-family: var(--font-body); font-size: 12.5px; font-weight: 700; padding: 8px 18px;
    border: 1.5px solid var(--text); background: var(--text); color: var(--surface-2); border-radius: 2px; cursor: pointer;
  }
  .cost-form button:hover:not(:disabled) { background: var(--gold-deep); border-color: var(--gold-deep); }
  .cost-form button:disabled { opacity: .5; cursor: not-allowed; }
  .cost-form .note { font-size: 11.5px; color: var(--text-muted); min-height: 16px; }
  .cost-form .note.ok { color: var(--gold-deep); font-weight: 600; }
  .cost-form .note.bad { color: var(--loss); font-weight: 600; }

  input.mini {
    font-family: var(--font-body); font-feature-settings: 'tnum'; font-size: 12.5px; padding: 5px 7px; width: 100px;
    border: 1px solid var(--divider-strong); border-radius: 2px; background: #fff; text-align: right; color: var(--text);
  }
  input.mini:focus { outline: none; border-color: var(--gold); }
  input.mini.month { width: 122px; text-align: left; }
  button.mini-save {
    font-family: var(--font-body); font-size: 11.5px; font-weight: 700; padding: 6px 12px;
    border: 1px solid var(--text); background: var(--text); color: var(--surface-2); border-radius: 2px; cursor: pointer;
  }
  button.mini-save:hover:not(:disabled) { background: var(--gold-deep); border-color: var(--gold-deep); }
  button.mini-save:disabled { opacity: .5; cursor: not-allowed; }
  .row-note { font-size: 11px; color: var(--text-muted); margin-top: 3px; min-height: 14px; }
  .row-note.ok { color: var(--gold-deep); font-weight: 600; }
  .row-note.bad { color: var(--loss); font-weight: 600; }

  footer.src { font-size: 11px; color: var(--text-faint); margin-top: 40px; padding-top: 16px; border-top: 1px solid var(--divider); text-align: center; line-height: 1.9; }
  #loading, #empty { text-align: center; padding: 80px 0; color: var(--text-muted); font-size: 14px; }

  @media (max-width: 760px) {
    .wrap { padding: 20px 16px 80px; }
    .hero { grid-template-columns: 1fr; }
    .hero .div { display: none; }
    .hero .cell { border-top: 1px solid var(--divider); }
    .hero .cell:first-child { border-top: none; }
    .hero .big { font-size: 48px; }
    /* 手機版改橫向捲動看完整欄位，不隱藏欄位——毛利率/毛利本來就是這頁的重點，
       藏起來反而讓 Colin 在手機上看不到最需要的數字 */
    .card-table { overflow-x: auto; }
    table.data-table { min-width: 620px; }
    .cost-form input { width: 100px; }
  }
</style>
</head>
<body>

<div id="gate">
  <div class="box">
    <div class="rule"></div>
    <h1>批次即時毛利</h1>
    <p>財務資料，需要密碼才能查看</p>
    <input id="pwInput" type="password" placeholder="請輸入密碼" autocomplete="current-password">
    <button id="pwSubmit">進入</button>
    <div class="err" id="pwErr"></div>
  </div>
</div>

<div id="app">
  <div class="nav">
    <div class="nav-brand">LOPIA<span class="sub">批次即時毛利</span></div>
    <div style="display:flex;align-items:center;">
      <div class="nav-live">
        <span class="pulse-dot"></span>
        <span>即時更新 · <span id="lastUpdatedClock">—</span></span>
      </div>
      <button class="refresh" id="refreshBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
        重新整理
      </button>
    </div>
  </div>

  <div class="wrap">
    <div class="controls-row">
      <button class="toggle-link" id="toggleInactiveBtn">顯示未出貨批次</button>
      <label class="chk-label"><input type="checkbox" id="lossOnlyChk"> 只看虧損批次</label>
      <div class="sort-wrap">
        <span class="lbl">排序</span>
        <div class="seg" id="sortSeg">
          <button data-sort="margin" class="active">毛利率</button>
          <button data-sort="profit">毛利額</button>
          <button data-sort="batch">批次</button>
        </div>
      </div>
    </div>
    <div class="helper-text">仕入填日圓（÷4.5 換算台幣成本），關稅通關／雜費填台幣。點列展開可填成本、看逐筆出貨明細。虧損批次以紅色標示，「缺單價」表示尚有品項未定價。</div>

    <div id="loading">載入中…</div>
    <div id="empty" style="display:none;"></div>
    <div id="content" style="display:none;"></div>

    <footer class="src" id="srcFooter"></footer>
  </div>
</div>

<script>
const API_BASE = '';
let currentData = null;
let showInactive = false;
let lossOnly = false;
let sortMode = 'margin'; // 'margin' | 'profit' | 'batch'

function fmt(n) { return Math.round(n || 0).toLocaleString('en-US'); }
function pct(r) { return ((r || 0) * 100).toFixed(1) + '%'; }
// 頂部大數字用「萬」壓縮，表格明細維持完整數字（精簡但不失真）
function fmtWan(n) {
  const v = n || 0;
  const neg = v < 0;
  const abs = Math.abs(v);
  const s = abs >= 10000 ? (abs / 10000).toFixed(1) + '萬' : fmt(abs);
  return (neg ? '-' : '') + s; // 跟 fmt()/toLocaleString 的負號字元一致（ASCII連字號，不是 U+2212）
}
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
// 數字輸入格：空白=null（清空），有值必須是 0 以上的數字，不合法丟錯不送出
function parseInputNum(el, label) {
  const v = el.value.trim().replace(/,/g, '');
  if (v === '') return null;
  const n = Number(v);
  if (!isFinite(n) || n < 0) throw new Error(label + ' 必須是 0 以上的數字');
  return n;
}
// 毛利率分級著色（虧損／偏薄／健康），套用在毛利率與毛利兩欄
function toneClass(marginRate) {
  if (marginRate < 0) return 'tone-loss';
  if (marginRate < 0.10) return 'tone-thin';
  return 'tone-healthy';
}
function formatClock(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '—';
  const p = n => String(n).padStart(2, '0');
  return p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
}

// ── 密碼閘門 ──────────────────────────────────────────────────────────────
async function checkAuth() {
  try { const r = await fetch(API_BASE + '/api/auth'); const d = await r.json(); return !!d.ok; }
  catch { return false; }
}
async function doLogin() {
  const pw = document.getElementById('pwInput').value;
  const btn = document.getElementById('pwSubmit');
  const err = document.getElementById('pwErr');
  btn.disabled = true; err.textContent = '';
  try {
    const r = await fetch(API_BASE + '/api/auth', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ password: pw }) });
    const d = await r.json();
    if (d.ok) { showApp(); } else { err.textContent = d.error || '密碼錯誤'; }
  } catch { err.textContent = '連線失敗，請重試'; }
  finally { btn.disabled = false; }
}
function showApp() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData();
}

// ── 抓資料 ────────────────────────────────────────────────────────────────
async function loadData() {
  const refreshBtn = document.getElementById('refreshBtn');
  refreshBtn.disabled = true;
  refreshBtn.classList.add('spinning');
  document.getElementById('loading').style.display = 'block';
  document.getElementById('empty').style.display = 'none';
  document.getElementById('content').style.display = 'none';
  try {
    const r = await fetch(API_BASE + '/api/profit', { cache: 'no-store' });
    if (r.status === 401) { document.getElementById('gate').style.display = 'flex'; document.getElementById('app').style.display = 'none'; return; }
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || '讀取失敗');
    currentData = d;
    render();
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
    document.getElementById('empty').textContent = '載入失敗：' + e.message;
  } finally {
    refreshBtn.disabled = false;
    setTimeout(() => refreshBtn.classList.remove('spinning'), 500);
  }
}

// ── 篩選／排序（不含成本輸入表單）─────────────────────────────────────────
function sortBatches(list) {
  const arr = list.slice();
  if (sortMode === 'margin') arr.sort((a, b) => b.marginRate - a.marginRate);
  else if (sortMode === 'profit') arr.sort((a, b) => b.margin - a.margin);
  else arr.sort((a, b) => (b.ivName || '').localeCompare(a.ivName || '')); // 批次代碼字典序倒序
  return arr;
}
function visibleBatches(d) {
  let list = d.batches.filter(b => showInactive || b.shippedBoxes > 0 || b.futureBoxes > 0);
  if (lossOnly) list = list.filter(b => b.margin < 0);
  return sortBatches(list);
}

// ── 渲染 ──────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('loading').style.display = 'none';
  const d = currentData;
  document.getElementById('content').style.display = 'block';
  document.getElementById('content').innerHTML =
    renderBanners(d) + renderHero(d) + renderBatchTable(d) + renderMonthTable(d);
  document.getElementById('lastUpdatedClock').textContent = formatClock(d.lastUpdated);
  document.getElementById('srcFooter').textContent =
    '資料來源：Notion（進口批次成本欄＋出貨紀錄＋月度物流費用） ｜ 最後更新 ' + (d.lastUpdated || '').replace('T',' ').slice(0,16);
  bindBatchRows();
  bindCostForms();
  bindLogisticsRows();
}

function renderBanners(d) {
  let html = '';
  if (d.fy.batchesWithMissingCost > 0) {
    html += `<div class="banner bad"><span class="tag">成本未填</span>本財年有 ${d.fy.batchesWithMissingCost} 個出貨中批次的成本還沒填齊，這些批次毛利會偏高。點批次列展開就能填。</div>`;
  }
  if (d.fy.monthsWithMissingLogistics.length > 0) {
    html += `<div class="banner"><span class="tag">物流未填</span>${d.fy.monthsWithMissingLogistics.map(esc).join('、')} 的三義／優儲月度總額還沒填，這幾個月的毛利尚未扣物流。到最下方「月度彙總」填。</div>`;
  }
  const orphan = d.batches.find(b => b.batchId === '__unlinked__');
  if (orphan) {
    html += `<div class="banner"><span class="tag">未連結</span>有 ${orphan.rows.length} 筆出貨紀錄沒填「關聯批次」（多為3–4月對帳時代的資料）。營收已計入月度彙總，但進貨成本無法分攤到這些筆，明細見批次表最後的「未連結批次」列。</div>`;
  }
  return html;
}

function renderHero(d) {
  const f = d.fy;
  const c = f.confirmed;
  // 主視覺＝確定毛利（已出完＋成本填齊的批次）；出貨中批次成本只攤了已出比例、
  // 耗損報廢都在後面，混進主數字會虛高，「含出貨中」只當暫估小字參考
  const tone = toneClass(c.marginRate);
  const realBatches = d.batches.filter(b => b.batchId !== '__unlinked__');
  const shipTotal = realBatches.reduce((s, b) => s + b.shippedBoxes, 0);
  const boxBase = realBatches.reduce((s, b) => s + b.totalBoxes, 0);
  const shipPct = boxBase > 0 ? Math.round(shipTotal / boxBase * 100) : 0;

  return `<div class="hero">
    <div class="cell main">
      <div class="label">本財年確定毛利率</div>
      <div class="big-row"><span class="big ${tone}">${(c.marginRate * 100).toFixed(1)}</span><span class="pct ${tone}">%</span></div>
      <div class="note">${c.batches} 個已出完＋成本填齊批次</div>
      <div class="note dim">含出貨中暫估 ${f.margin >= 0 ? '+' : ''}${fmtWan(f.margin)}（${pct(f.marginRate)}）</div>
    </div>
    <div class="div"></div>
    <div class="cell">
      <div class="label">確定毛利</div>
      <div class="mid ${tone}">${c.margin >= 0 ? '+' : ''}${fmtWan(c.margin)}</div>
    </div>
    <div class="div"></div>
    <div class="cell">
      <div class="label">確定營收</div>
      <div class="mid">${fmtWan(c.revenue)}</div>
      <div class="note">成本 ${fmtWan(c.cost)}</div>
    </div>
    <div class="div"></div>
    <div class="cell">
      <div class="label">出貨進度</div>
      <div class="big-row"><span class="mid">${shipPct}</span><span class="note" style="font-size:16px;">%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${shipPct}%"></div></div>
      <div class="note">${realBatches.length} 個批次</div>
    </div>
  </div>`;
}

function batchStatusHtml(b) {
  if (b.batchId === '__unlinked__') {
    let badges = '<span class="pill fill-gold">沒填關聯批次</span>';
    if (b.missingPriceRows > 0) badges += `<span class="pill fill-neutral">缺單價${b.missingPriceRows}筆</span>`;
    return badges;
  }
  let ship;
  // 歷史批次的出貨紀錄可能不完整（Notion紀錄3月才開始），Notion「配送狀態」標了全數出貨就以人工認定為準
  if (b.deliveryStatus === '全數出貨') ship = '<span class="pill outline-gold">已出完</span>';
  else if (b.shippedBoxes <= 0 && b.futureBoxes <= 0) ship = '<span class="pill outline-neutral">未出貨</span>';
  else if (b.shippedBoxes >= b.totalBoxes && b.totalBoxes > 0) ship = '<span class="pill outline-gold">已出完</span>';
  else ship = '<span class="pill outline-neutral">出貨中</span>';
  let badges = '';
  if (b.costStatus === 'none') badges += '<span class="pill fill-loss">成本未填</span>';
  else if (b.costStatus === 'partial') badges += '<span class="pill fill-gold">成本未齊</span>';
  if (b.missingPriceRows > 0) badges += `<span class="pill fill-neutral">缺單價${b.missingPriceRows}筆</span>`;
  return ship + badges;
}

function renderBatchTable(d) {
  const list = visibleBatches(d);
  const hidden = d.batches.length - list.length;
  const rows = list.map((b, idx) => {
    const noData = b.shippedBoxes <= 0;
    const tone = noData ? '' : toneClass(b.marginRate);
    const barPct = b.totalBoxes > 0 ? Math.min(100, Math.round(b.shippedBoxes / b.totalBoxes * 100)) : 0;
    return `<tr class="batch-row${noData ? ' muted' : ''}" data-idx="${idx}">
        <td>
          <div style="display:flex;align-items:baseline;gap:6px;">
            <span class="caret">▸</span>
            <span class="product-name">${esc(b.productSummary || b.ivName)}</span>
          </div>
          <div class="product-meta">${esc(b.ivName)} ${batchStatusHtml(b)}</div>
        </td>
        <td>
          <div class="ship-line num">${fmt(b.shippedBoxes)} / ${fmt(b.totalBoxes)}</div>
          <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${barPct}%"></div></div>
        </td>
        <td class="num">${fmt(b.revenue)}</td>
        <td class="num">${fmt(b.allocImport + b.allocLogistics)}</td>
        <td class="num"><span class="margin-rate ${tone}">${noData ? '－' : pct(b.marginRate)}</span></td>
        <td class="num ${tone}">${noData ? '－' : (b.margin >= 0 ? '+' : '') + fmt(b.margin)}</td>
      </tr>
      <tr class="expand-row" data-expand="${idx}" style="display:none;"><td colspan="6"></td></tr>`;
  }).join('');
  const hint = hidden > 0 ? ` · 另有 ${hidden} 個未出貨批次已隱藏（左上角可顯示）` : '';
  return `<h2 class="section">批次即時毛利<span class="hint"> · 點列展開明細與成本輸入${hint}</span></h2>
    <div class="card-table"><table class="data-table">
      <thead><tr>
        <th style="width:30%">批次 · 商品</th><th style="width:16%">出貨 / 庫存</th>
        <th class="num" style="width:15%">營收</th><th class="num" style="width:15%">成本分攤</th>
        <th class="num" style="width:12%">毛利率</th><th class="num" style="width:12%">毛利</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function bindBatchRows() {
  document.querySelectorAll('tr.batch-row').forEach(row => {
    row.addEventListener('click', (e) => {
      if (e.target.closest('.cost-form')) return; // 點成本表單不要收合
      toggleBatchRow(Number(row.dataset.idx));
    });
  });
}

function toggleBatchRow(idx) {
  const row = document.querySelector(`tr.batch-row[data-idx="${idx}"]`);
  const expandRow = document.querySelector(`tr.expand-row[data-expand="${idx}"]`);
  const isOpen = row.classList.contains('open');
  document.querySelectorAll('tr.batch-row.open').forEach(r => r.classList.remove('open'));
  document.querySelectorAll('tr.expand-row').forEach(r => { r.style.display = 'none'; r.querySelector('td').innerHTML = ''; });
  if (isOpen) return;

  row.classList.add('open');
  const b = visibleBatches(currentData)[idx];
  const subRows = b.rows.map(s => {
    const cls = s.isFuture ? ' class="future"' : '';
    return `<tr${cls}>
      <td>${esc(s.date || '—')}${s.isFuture ? '（計畫）' : ''}</td><td>${esc(s.store || '—')}</td>
      <td class="num">${fmt(s.boxes)}</td>
      <td class="num">${s.isFuture ? '—' : fmt(s.revenue)}</td>
      <td class="num">${s.isFuture ? '—' : fmt(s.allocImport)}</td>
      <td class="num">${s.isFuture ? '—' : fmt(s.allocLogistics)}</td>
      <td class="num">${s.isFuture ? '—' : (s.margin >= 0 ? '+' : '') + fmt(s.margin)}</td>
    </tr>`;
  }).join('');
  const costNote = `整批成本：仕入 ${fmt(b.shiireTwd)}（台幣換算）＋ 關稅通關 ${fmt(b.tariffCustoms)} ＋ 雜費 ${fmt(b.miscFee)} ＝ ${fmt(b.costFull)}，攤到已出 ${fmt(b.shippedBoxes)}／${fmt(b.totalBoxes)} 箱`;
  // 「未連結批次」是虛擬列，沒有批次可以寫成本，不顯示成本表單
  const costFormHtml = b.batchId === '__unlinked__' ? '' : `
    <div class="cost-form" data-batch-idx="${idx}">
      <div class="field"><label>仕入原價（日圓）</label><input class="cf-shiire" inputmode="decimal" placeholder="未填"></div>
      <div class="field"><label>關稅＋通關費（台幣）</label><input class="cf-tariff" inputmode="decimal" placeholder="未填"></div>
      <div class="field"><label>雜費（台幣）</label><input class="cf-misc" inputmode="decimal" placeholder="未填"></div>
      <button class="cf-save">儲存成本</button>
      <div class="note cf-note">${esc(costNote)}</div>
    </div>`;
  expandRow.querySelector('td').innerHTML = `
    <table class="detail-table">
      <thead><tr>
        <th>出貨日</th><th>門市</th><th class="num">箱數</th><th class="num">營收</th>
        <th class="num">分攤進貨</th><th class="num">分攤物流</th><th class="num">毛利</th>
      </tr></thead><tbody>${subRows || '<tr><td colspan="7">尚無出貨紀錄</td></tr>'}</tbody>
    </table>${costFormHtml}`;
  expandRow.style.display = 'table-row';
  bindCostForms();
}

function bindCostForms() {
  document.querySelectorAll('.cost-form').forEach(form => {
    if (form.dataset.bound) return;
    form.dataset.bound = '1';
    const idx = Number(form.dataset.batchIdx);
    const b = visibleBatches(currentData)[idx];
    // 預帶目前 Notion 裡的原始值（null=沒填就留空白，0 也要顯示）
    const shiireEl = form.querySelector('.cf-shiire');
    const tariffEl = form.querySelector('.cf-tariff');
    const miscEl = form.querySelector('.cf-misc');
    if (b.shiireJpyRaw != null) shiireEl.value = String(b.shiireJpyRaw);
    if (b.tariffCustomsRaw != null) tariffEl.value = String(b.tariffCustomsRaw);
    if (b.miscFeeRaw != null) miscEl.value = String(b.miscFeeRaw);
    const btn = form.querySelector('.cf-save');
    const note = form.querySelector('.cf-note');
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      let payload;
      try {
        payload = {
          batchId: b.batchId,
          shiireJpy: parseInputNum(shiireEl, '仕入原價'),
          tariffCustoms: parseInputNum(tariffEl, '關稅通關費'),
          miscFee: parseInputNum(miscEl, '雜費'),
        };
      } catch (err) { note.textContent = err.message; note.className = 'note cf-note bad'; return; }
      btn.disabled = true;
      note.textContent = '存檔中…'; note.className = 'note cf-note';
      try {
        const r = await fetch(API_BASE + '/api/profit/costs', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
        });
        const resp = await r.json();
        if (!r.ok) throw new Error(resp.error || '存檔失敗');
        note.textContent = '已存進 Notion，重新計算中…'; note.className = 'note cf-note ok';
        await loadData();
      } catch (err) {
        note.textContent = '存檔失敗：' + err.message; note.className = 'note cf-note bad';
        btn.disabled = false;
      }
    });
  });
}

// ── 月度彙總＋物流輸入 ────────────────────────────────────────────────────
function renderMonthTable(d) {
  // 月份集合 = 有出貨的月份 ∪ 已填物流的月份
  const byMonth = new Map();
  for (const m of d.months) byMonth.set(m.month, { ...m });
  for (const l of d.logisticsEntries) {
    if (!byMonth.has(l.month)) byMonth.set(l.month, { month: l.month, boxes: 0, revenue: 0, importCost: 0, logistics: (l.sanyi||0)+(l.yuchu||0), logisticsFilled: true, margin: 0, marginRate: 0 });
  }
  const logByMonth = new Map(d.logisticsEntries.map(l => [l.month, l]));
  const months = [...byMonth.values()].sort((a, b) => b.month.localeCompare(a.month));

  const rows = months.map((m, i) => {
    const log = logByMonth.get(m.month);
    const sanyiVal = log && log.sanyi != null ? String(log.sanyi) : '';
    const yuchuVal = log && log.yuchu != null ? String(log.yuchu) : '';
    const tone = m.revenue > 0 ? toneClass(m.marginRate) : '';
    return `<tr>
      <td class="num">${esc(m.month)}</td>
      <td class="num">${fmt(m.boxes)}</td>
      <td class="num">${fmt(m.revenue)}</td>
      <td class="num">${fmt(m.importCost)}</td>
      <td>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          <input class="mini lg-sanyi" data-m="${i}" inputmode="decimal" placeholder="三義" value="${esc(sanyiVal)}">
          <input class="mini lg-yuchu" data-m="${i}" inputmode="decimal" placeholder="優儲" value="${esc(yuchuVal)}">
          <button class="mini-save lg-save" data-m="${i}" data-month="${esc(m.month)}">存</button>
        </div>
        <div class="row-note lg-note" data-m="${i}">${m.logisticsFilled ? '' : '未填，該月毛利尚未扣物流'}</div>
      </td>
      <td class="num ${tone}">${m.revenue > 0 ? (m.margin >= 0 ? '+' : '') + fmt(m.margin) + '（' + pct(m.marginRate) + '）' : '－'}</td>
    </tr>`;
  }).join('');

  return `<h2 class="section">月度彙總<span class="hint"> · 三義／優儲收到月結帳單就填在這裡（台幣），按當月出貨箱數自動攤到各批</span></h2>
    <div class="card-table"><table class="data-table">
      <thead><tr>
        <th>月份</th><th class="num">箱數</th><th class="num">營收</th><th class="num">進貨分攤</th>
        <th>物流（三義／優儲）</th><th class="num">當月毛利（率）</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tbody><tr>
        <td colspan="6">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--text-muted);">
            補其他月份：
            <input class="mini month" id="newLogMonth" type="month">
            <input class="mini" id="newLogSanyi" inputmode="decimal" placeholder="三義">
            <input class="mini" id="newLogYuchu" inputmode="decimal" placeholder="優儲">
            <button class="mini-save" id="newLogSave">存</button>
            <span class="row-note" id="newLogNote"></span>
          </div>
        </td>
      </tr></tbody>
    </table></div>`;
}

async function saveLogistics(month, sanyiEl, yuchuEl, btn, noteEl) {
  let sanyi, yuchu;
  try {
    sanyi = parseInputNum(sanyiEl, '三義費用');
    yuchu = parseInputNum(yuchuEl, '優儲費用');
  } catch (err) { noteEl.textContent = err.message; noteEl.classList.add('bad'); return; }
  btn.disabled = true;
  noteEl.className = noteEl.className.replace(/\b(ok|bad)\b/g, '').trim();
  noteEl.textContent = '存檔中…';
  try {
    const r = await fetch(API_BASE + '/api/profit/logistics', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ month, sanyi, yuchu }),
    });
    const resp = await r.json();
    if (!r.ok) throw new Error(resp.error || '存檔失敗');
    noteEl.textContent = '已存，重新計算中…'; noteEl.classList.add('ok');
    await loadData();
  } catch (err) {
    noteEl.textContent = '存檔失敗：' + err.message; noteEl.classList.add('bad');
    btn.disabled = false;
  }
}

function bindLogisticsRows() {
  document.querySelectorAll('button.lg-save').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = btn.dataset.m;
      saveLogistics(
        btn.dataset.month,
        document.querySelector(`input.lg-sanyi[data-m="${i}"]`),
        document.querySelector(`input.lg-yuchu[data-m="${i}"]`),
        btn,
        document.querySelector(`.lg-note[data-m="${i}"]`),
      );
    });
  });
  const newSave = document.getElementById('newLogSave');
  if (newSave) newSave.addEventListener('click', () => {
    const month = document.getElementById('newLogMonth').value;
    const note = document.getElementById('newLogNote');
    if (!/^\d{4}-\d{2}$/.test(month)) { note.textContent = '請先選月份'; note.classList.add('bad'); return; }
    saveLogistics(month, document.getElementById('newLogSanyi'), document.getElementById('newLogYuchu'), newSave, note);
  });
}

// ── 控制列（靜態元素，只綁一次；改變篩選/排序後只重畫 #content）────────────
document.getElementById('toggleInactiveBtn').addEventListener('click', () => {
  showInactive = !showInactive;
  document.getElementById('toggleInactiveBtn').textContent = showInactive ? '隱藏未出貨批次' : '顯示未出貨批次';
  if (currentData) render();
});
document.getElementById('lossOnlyChk').addEventListener('change', (e) => {
  lossOnly = e.target.checked;
  if (currentData) render();
});
document.getElementById('sortSeg').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-sort]');
  if (!btn) return;
  sortMode = btn.dataset.sort;
  document.querySelectorAll('#sortSeg button').forEach(b => b.classList.toggle('active', b === btn));
  if (currentData) render();
});

// ── 啟動 ──────────────────────────────────────────────────────────────────
document.getElementById('pwSubmit').addEventListener('click', doLogin);
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('refreshBtn').addEventListener('click', loadData);

(async function init() {
  const authed = await checkAuth();
  if (authed) showApp();
})();
</script>
</body>
</html>
