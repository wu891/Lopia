<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOPIA 批次即時毛利</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ── 2026-07-17 改版：套用「Modernist」設計交付包（Archivo 字體、紅 #ec3013 單一強調色、
     2px 黑框無圓角）。資料來源、密碼驗證、成本／物流寫入邏輯完全不動，只換版面與視覺。
     中文沿用 Noto Sans TC、日文沿用 Noto Sans JP 當後備字體（Archivo 本身不含中日文字glyph）。 */
  :root {
    --color-accent: #ec3013; --color-accent-200: #ffe0d9; --color-accent-600: #dd2b0f; --color-accent-700: #ae1800;
    --color-text: #201e1d; --color-bg: #f3f2f2; --color-neutral-200: #eae7e7; --color-neutral-400: #b3aeae;
    --color-neutral-600: #7d7979; --color-neutral-700: #605d5d;
    --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-6: 24px; --space-8: 32px;
    --font: 'Archivo', 'Noto Sans TC', 'Noto Sans JP', -apple-system, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); color: var(--color-text); background: var(--color-bg); line-height: 1.5; -webkit-font-smoothing: antialiased; }
  .num { font-variant-numeric: tabular-nums; }
  :focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }

  /* ── 密碼閘門 ── */
  #gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--color-bg); }
  #gate .box { background: #fff; border: 2px solid var(--color-text); padding: 44px 40px; width: 320px; text-align: center; }
  #gate h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  #gate p { font-size: 12.5px; color: var(--color-neutral-600); margin-bottom: 24px; }
  #gate input {
    width: 100%; padding: 11px 13px; border: none; border-bottom: 2px solid var(--color-text);
    background: transparent; font-family: var(--font); font-size: 14px; margin-bottom: 14px; text-align: center; color: var(--color-text);
  }
  #gate input:focus { outline: none; border-bottom-color: var(--color-accent); }
  #gate button {
    width: 100%; padding: 11px; border: 2px solid var(--color-text); background: var(--color-text);
    color: var(--color-bg); font-family: var(--font); font-weight: 800; font-size: 13.5px; letter-spacing: 0.5px; cursor: pointer;
  }
  #gate button:hover:not(:disabled) { background: var(--color-accent); border-color: var(--color-accent); }
  #gate button:disabled { opacity: 0.5; cursor: not-allowed; }
  #gate .err { color: var(--color-accent-700); font-size: 12px; margin-top: 12px; min-height: 16px; font-weight: 700; }

  /* ── 主畫面 ── */
  #app { display: none; }
  .pd-wrap { max-width: 1180px; margin: 0 auto; padding: var(--space-6) var(--space-6) var(--space-8); }
  @media (max-width: 720px) { .pd-wrap { padding: var(--space-4); } }

  .pd-head { display: flex; align-items: flex-end; justify-content: space-between; gap: var(--space-4); flex-wrap: wrap; border-bottom: 2px solid var(--color-text); padding-bottom: var(--space-3); }
  .pd-eyebrow { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--color-neutral-600); margin-bottom: 6px; font-weight: 700; }
  .pd-h1 { font-size: 34px; line-height: 1; font-weight: 800; }
  .pd-headctrl { display: flex; align-items: center; gap: var(--space-3); flex-wrap: wrap; }
  .pd-chk { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; user-select: none; }
  .pd-chk input { width: 16px; height: 16px; accent-color: var(--color-accent); cursor: pointer; }
  button.btn { font-family: var(--font); font-size: 13px; font-weight: 700; padding: 9px 15px; border: 2px solid var(--color-text); background: var(--color-text); color: var(--color-bg); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  button.btn.btn-secondary { background: var(--color-bg); color: var(--color-text); }
  button.btn.btn-secondary:hover:not(:disabled) { background: var(--color-neutral-200); }
  button.btn:disabled { opacity: .5; cursor: not-allowed; }
  button.btn svg { transition: transform .5s ease; }
  button.btn.spinning svg { transform: rotate(360deg); }
  .pd-helper { font-size: 12px; color: var(--color-neutral-600); margin-top: var(--space-2); }

  /* ── 語言切換 ── */
  .pd-langseg { display: flex; border: 2px solid var(--color-text); }
  .pd-langseg button { font-family: var(--font); font-size: 12px; font-weight: 700; padding: 8px 13px; border: none; border-left: 2px solid var(--color-text); background: var(--color-bg); color: var(--color-text); cursor: pointer; }
  .pd-langseg button:first-child { border-left: none; }
  .pd-langseg button.active { background: var(--color-text); color: var(--color-bg); }

  /* ── 待處理提醒卡 ── */
  .pd-todo { border: 2px solid var(--color-text); margin-top: var(--space-4); padding: var(--space-3) var(--space-4); }
  .pd-todo-title { font-size: 11px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--color-neutral-600); margin-bottom: 8px; }
  .pd-todo-row { display: flex; gap: 8px; font-size: 13px; line-height: 1.65; align-items: flex-start; }
  .pd-todo-row + .pd-todo-row { margin-top: 6px; }
  .pd-todo-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; background: var(--color-neutral-600); }
  .pd-todo-dot.bad { background: var(--color-accent); }
  .pd-todo-tag { font-weight: 800; margin-right: 2px; }

  /* ── KPI 列 ── */
  .pd-kpi { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 2px solid var(--color-text); margin-top: var(--space-4); }
  .pd-kpi > div { padding: var(--space-4); border-right: 2px solid var(--color-text); }
  .pd-kpi > div:last-child { border-right: none; }
  .pd-kpi .lbl { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--color-neutral-600); font-weight: 700; }
  .pd-kpi .val { font-size: 30px; font-weight: 800; margin-top: 6px; line-height: 1; }
  .pd-kpi .sub { font-size: 12px; color: var(--color-neutral-600); margin-top: 6px; }
  .pd-kpi .accent { background: var(--color-accent); }
  .pd-kpi .accent .lbl, .pd-kpi .accent .sub { color: var(--color-accent-200); }
  .pd-kpi .accent .val { color: var(--color-bg); font-weight: 900; }

  /* ── 狀態分頁 ── */
  .pd-tabs { display: flex; gap: 0; margin-top: var(--space-4); border-bottom: 2px solid var(--color-text); flex-wrap: wrap; }
  .pd-tab { font-family: var(--font); font-size: 13px; font-weight: 700; padding: 9px 16px; cursor: pointer; background: none; border: 2px solid transparent; border-bottom: none; color: var(--color-neutral-700); margin-bottom: -2px; display: flex; align-items: center; gap: 7px; }
  .pd-tab.active { border-color: var(--color-text); background: var(--color-bg); color: var(--color-text); }
  .pd-tab .cnt { font-size: 11px; font-weight: 800; padding: 1px 7px; background: var(--color-neutral-200); color: var(--color-text); }
  .pd-tab.active .cnt { background: var(--color-text); color: var(--color-bg); }

  /* ── 次要控制列：排序／只看虧損 ── */
  .pd-controls { display: flex; align-items: center; gap: var(--space-3); margin-top: var(--space-3); flex-wrap: wrap; font-size: 12.5px; }
  .pd-controls .lbl { color: var(--color-neutral-600); }
  .pd-seg { display: flex; border: 2px solid var(--color-text); }
  .pd-seg button { font-family: var(--font); font-size: 12px; font-weight: 700; padding: 6px 12px; border: none; border-left: 2px solid var(--color-text); background: var(--color-bg); color: var(--color-text); cursor: pointer; }
  .pd-seg button:first-child { border-left: none; }
  .pd-seg button.active { background: var(--color-text); color: var(--color-bg); }
  .pd-controls .pd-chk { margin-left: auto; }

  /* ── 視覺區：長條圖＋區間圖 ── */
  .pd-visual { display: grid; grid-template-columns: 1.5fr 1fr; gap: var(--space-4); margin-top: var(--space-4); }
  @media (max-width: 860px) { .pd-visual { grid-template-columns: 1fr; } }
  .pd-panel { border: 2px solid var(--color-text); padding: var(--space-4); }
  .pd-panel h3 { font-size: 16px; font-weight: 800; }
  .pd-panel-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: var(--space-3); }
  .pd-panel-head .unit { font-size: 11px; color: var(--color-neutral-600); letter-spacing: .08em; text-transform: uppercase; font-weight: 700; }
  .pd-bar-row { display: grid; grid-template-columns: 130px 1fr 100px; align-items: center; gap: 10px; }
  .pd-bar-row + .pd-bar-row { margin-top: 10px; }
  .pd-bar-name { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pd-bar-track { height: 18px; background: var(--color-neutral-200); position: relative; }
  .pd-bar-fill { height: 100%; }
  .pd-bar-val { font-size: 13px; font-weight: 700; text-align: right; }
  .pd-empty-note { font-size: 12px; color: var(--color-neutral-600); }

  .pd-bucket + .pd-bucket { margin-top: var(--space-3); }
  .pd-bucket-head { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
  .pd-bucket-head .cnt { font-weight: 700; }
  .pd-bucket-track { height: 10px; background: var(--color-neutral-200); }
  .pd-bucket-fill { height: 100%; }

  /* ── 表格共用 ── */
  .pd-table-wrap { border: 2px solid var(--color-text); margin-top: var(--space-4); }
  .pd-table-head { display: flex; align-items: center; justify-content: space-between; padding: var(--space-3) var(--space-4); border-bottom: 2px solid var(--color-text); flex-wrap: wrap; gap: 8px; }
  .pd-table-head h3 { font-size: 16px; font-weight: 800; }
  .pd-table-head .meta { font-size: 12px; color: var(--color-neutral-600); }
  .pd-scroll { overflow-x: auto; }
  table.pd-table { width: 100%; border-collapse: collapse; min-width: 920px; }
  table.pd-table thead th { text-align: left; font-size: 11px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; color: var(--color-neutral-600); padding: 10px 14px; border-bottom: 2px solid var(--color-text); white-space: nowrap; }
  table.pd-table td { padding: 12px 14px; border-bottom: 1px solid var(--color-neutral-200); font-size: 14px; vertical-align: top; }
  table.pd-table th.r, table.pd-table td.r { text-align: right; }
  tr.pd-row { cursor: pointer; }
  tr.pd-row:hover td { background: var(--color-neutral-200); }
  .pd-name { font-weight: 700; display: flex; align-items: center; gap: 4px; }
  .pd-id { font-size: 11px; color: var(--color-neutral-600); margin-top: 2px; }
  .pd-cost { width: 82px; text-align: right; min-height: 30px; padding: 5px 7px; font-family: var(--font); font-variant-numeric: tabular-nums; font-size: 13px; font-weight: 700; background: var(--color-bg); border: 1px solid var(--color-neutral-600); color: var(--color-text); }
  .pd-cost:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 1px; }
  .tag { font-size: 11px; font-weight: 800; padding: 3px 9px; display: inline-block; letter-spacing: .02em; white-space: nowrap; }
  .tag-accent { background: var(--color-accent-200); color: var(--color-accent-700); }
  .tag-neutral { background: var(--color-neutral-200); color: var(--color-neutral-700); }
  .plain-note { font-size: 10.5px; color: var(--color-neutral-600); margin-left: 6px; }
  .pd-caret { display: inline-block; width: 11px; font-size: 11px; color: var(--color-neutral-600); transition: transform .12s; }
  tr.pd-row.open .pd-caret { transform: rotate(90deg); }
  tr.pd-detail td { padding: 0 14px 18px; border-bottom: 1px solid var(--color-neutral-200); }
  .pd-detail-box { border: 2px solid var(--color-neutral-200); padding: 12px 14px; font-size: 12.5px; }
  .pd-detail-box table.detail-table { width: 100%; border-collapse: collapse; margin-top: 6px; }
  .pd-detail-box table.detail-table th { font-weight: 700; color: var(--color-neutral-600); text-align: left; padding: 4px 8px; font-size: 10px; text-transform: uppercase; letter-spacing: .03em; }
  .pd-detail-box table.detail-table td { padding: 5px 8px; border-bottom: 1px dotted var(--color-neutral-200); font-size: 12.5px; }
  .pd-detail-box table.detail-table td.r, .pd-detail-box table.detail-table th.r { text-align: right; }
  .pd-detail-box .future td { color: var(--color-neutral-600); font-style: italic; }
  .pd-costform { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-top: 10px; }
  .pd-field { display: flex; flex-direction: column; gap: 3px; }
  .pd-field label { font-size: 10px; font-weight: 800; color: var(--color-neutral-600); }
  .pd-field input { font-family: var(--font); font-size: 12.5px; padding: 6px 8px; width: 118px; text-align: right; border: 1px solid var(--color-neutral-600); font-variant-numeric: tabular-nums; background: #fff; color: var(--color-text); }
  .pd-field input:focus { outline: none; border-color: var(--color-accent); }
  .pd-savebtn { font-family: var(--font); font-size: 11.5px; font-weight: 800; padding: 7px 15px; border: 2px solid var(--color-text); background: var(--color-text); color: var(--color-bg); cursor: pointer; }
  .pd-savebtn:hover:not(:disabled) { background: var(--color-accent); border-color: var(--color-accent); }
  .pd-savebtn:disabled { opacity: .5; cursor: not-allowed; }
  .pd-toast { font-size: 11px; margin-top: 2px; min-height: 14px; color: var(--color-neutral-600); }
  .pd-toast.ok { color: var(--color-accent-700); font-weight: 700; }
  .pd-toast.bad { color: var(--color-accent); font-weight: 700; }
  .pd-note { font-size: 10.5px; color: var(--color-neutral-600); padding: 0 var(--space-4) var(--space-3); }

  /* ── 月度彙總 ── */
  h2.pd-section { font-size: 13px; font-weight: 800; letter-spacing: .02em; margin: var(--space-6) 0 var(--space-2); text-transform: uppercase; color: var(--color-neutral-700); }
  h2.pd-section .hint { font-weight: 500; text-transform: none; letter-spacing: 0; color: var(--color-neutral-600); font-size: 11.5px; }
  input.month-input { font-family: var(--font); font-size: 12px; padding: 5px 7px; width: 96px; border: 1px solid var(--color-neutral-600); text-align: right; font-variant-numeric: tabular-nums; background: #fff; color: var(--color-text); }
  input.month-input:focus { outline: none; border-color: var(--color-accent); }
  input.month-input.month { width: 122px; text-align: left; }
  button.month-save { font-family: var(--font); font-size: 11px; font-weight: 800; padding: 6px 12px; border: 2px solid var(--color-text); background: var(--color-text); color: var(--color-bg); cursor: pointer; }
  button.month-save:hover:not(:disabled) { background: var(--color-accent); border-color: var(--color-accent); }
  button.month-save:disabled { opacity: .5; cursor: not-allowed; }
  .month-flex { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .row-note { font-size: 10.5px; margin-top: 3px; color: var(--color-neutral-600); }
  .row-note.ok { color: var(--color-accent-700); font-weight: 700; }
  .row-note.bad { color: var(--color-accent); font-weight: 700; }

  footer.pd-src { font-size: 11px; color: var(--color-neutral-600); text-align: center; margin-top: var(--space-8); padding-top: var(--space-3); border-top: 1px solid var(--color-neutral-200); line-height: 1.8; }
  #loading, #empty { text-align: center; padding: 80px 0; color: var(--color-neutral-600); font-size: 14px; }
</style>
</head>
<body>

<div id="gate">
  <div class="box">
    <h1>批次即時毛利</h1>
    <p>財務資料，需要密碼才能查看</p>
    <input id="pwInput" type="password" placeholder="請輸入密碼" autocomplete="current-password">
    <button id="pwSubmit">進入</button>
    <div class="err" id="pwErr"></div>
  </div>
</div>

<div id="app">
  <div class="pd-wrap">
    <div class="pd-head">
      <div>
        <div class="pd-eyebrow" id="pageEyebrow"></div>
        <div class="pd-h1" id="pageH1"></div>
      </div>
      <div class="pd-headctrl">
        <div class="pd-langseg" id="langSeg">
          <button data-lang="zh">中文</button>
          <button data-lang="ja">日本語</button>
        </div>
        <label class="pd-chk"><input type="checkbox" id="showInactiveChk"> <span id="showUnshippedLabel"></span></label>
        <button class="btn btn-secondary" id="refreshBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
          <span id="refreshLabel"></span>
        </button>
      </div>
    </div>
    <div class="pd-helper"><span id="helperText"></span><span id="lastUpdatedClock">—</span></div>

    <div id="loading"></div>
    <div id="empty" style="display:none;"></div>
    <div id="content" style="display:none;"></div>

    <footer class="pd-src" id="srcFooter"></footer>
  </div>
</div>

<script>
const API_BASE = '';
let currentData = null;
let showInactive = false;
let lossOnly = false;
let sortMode = 'margin'; // 'margin' | 'profit' | 'batch'
let currentCat = 'all'; // 'all' | 'shipping' | 'done' | 'missing' | 'unlinked'
let lang = localStorage.getItem('profitLang') === 'ja' ? 'ja' : 'zh';

// ── 中日文字串（UI 介面用；批次/商品名稱等 Notion 原始資料不翻譯） ──────────────
const T = {
  zh: {
    pageH1: '批次即時毛利', eyebrow: 'LOPIA TAIWAN · 財務',
    showUnshipped: '顯示未出貨批次', refresh: '重新整理',
    helperText: '出貨隨自動扣庫存即時更新 · 成本在這頁直接填，填了立刻反映毛利 · 仕入填日圓（÷4.5換算），關稅通關／雜費點列展開填 · 最後更新 ',
    loading: '載入中…', loadFailed: '載入失敗：',
    todoTitle: '待處理',
    tagMissingCost: '成本未填',
    missingCostMsg: n => `本財年有 ${n} 個出貨中批次的成本還沒填齊，這些批次毛利會偏高。點批次列展開就能填。`,
    tagMissingLogistics: '物流未填',
    missingLogisticsMsg: months => `${months} 的三義／優儲月度總額還沒填，這幾個月的毛利尚未扣物流。到最下方「月度彙總」填。`,
    tagUnlinked: '未連結',
    unlinkedMsg: n => `有 ${n} 筆出貨紀錄沒填「關聯批次」（多為3–4月對帳時代的資料）。營收已計入月度彙總，但進貨成本無法分攤到這些筆，明細見批次表最後的「未連結批次」列。`,
    kpiTotalRevenue: '總營收', kpiBatchesUnit: n => `${n} 個批次`,
    kpiTotalCost: '總成本', kpiCostConverted: '仕入已換算',
    kpiTotalProfit: '總毛利', kpiIncludesShipping: '含出貨中批次',
    kpiAvgMargin: '平均毛利率', kpiLossCount: n => `虧損 ${n} 個批次`,
    catAll: '全部', catShipping: '出貨中', catDone: '已完成', catMissing: '成本未填', catUnlinked: '未連結',
    sortLabel: '排序', sortMargin: '毛利率', sortProfit: '毛利額', sortBatch: '批次',
    lossOnlyLabel: '只看虧損批次',
    panelBatchMargin: '各批次毛利', panelMarginBucket: '毛利率區間', panelMonthTrend: '月度毛利率趨勢',
    noBatchInCat: '此分類目前沒有批次', noMonthData: '尚無月度資料',
    bucket40: '40% 以上', bucket20_40: '20 – 40%', bucket0_20: '0 – 20%', bucketLoss: '虧損（0% 以下）',
    countUnit: n => `${n} 批`,
    tableTitle: '批次明細', tableMeta: n => `顯示 ${n} 筆 · 點列展開可編輯成本`,
    colBatchProduct: '批次 / 商品', colShipStock: '出貨/庫存', colShiire: '仕入 ¥',
    colCost: '成本 NT$', colRevenue: '營收 NT$', colMargin: '毛利 NT$', colMarginRate: '毛利率', colStatus: '狀態',
    notFilled: '未填', tagDone: '已完成', tagCostPartial: '成本未齊', tagNotShipped: '未出貨',
    missingPriceNote: n => `缺單價${n}筆`,

function t(key, ...args) {
  const v = (T[lang] || T.zh)[key];
  return typeof v === 'function' ? v(...args) : v;
}

function fmt(n) { return Math.round(n || 0).toLocaleString('en-US'); }
function fmtSigned(n) { const r = Math.round(n || 0); return (r < 0 ? '-' : '') + 'NT$' + Math.abs(r).toLocaleString('en-US'); }
function pct(r) { return ((r || 0) * 100).toFixed(1) + '%'; }
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function marginColor(m) { return m < 0 ? 'var(--color-accent)' : 'var(--color-text)'; }
// 數字輸入格：空白=null（清空），有值必須是 0 以上的數字，不合法丟錯不送出
function parseInputNum(el, label) {
  const v = el.value.trim().replace(/,/g, '');
  if (v === '') return null;
  const n = Number(v);
  if (!isFinite(n) || n < 0) throw new Error(t('errMustBeNonNeg', label));
  return n;
}
function formatClock(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '—';
  const p = n => String(n).padStart(2, '0');
  return p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
}

// ── 密碼閘門 ──────────────────────────────────────────────────────────────
async function checkAuth() {
  try { const r = await fetch(API_BASE + '/api/auth'); const d = await r.json(); return !!d.ok; }
  catch { return false; }
}
async function doLogin() {
  const pw = document.getElementById('pwInput').value;
  const btn = document.getElementById('pwSubmit');
  const err = document.getElementById('pwErr');
  btn.disabled = true; err.textContent = '';
  try {
    const r = await fetch(API_BASE + '/api/auth', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ password: pw }) });
    const d = await r.json();
    if (d.ok) { showApp(); } else { err.textContent = d.error || '密碼錯誤'; }
  } catch { err.textContent = '連線失敗，請重試'; }
  finally { btn.disabled = false; }
}
function showApp() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData();
}

// ── 抓資料 ────────────────────────────────────────────────────────────────
async function loadData() {
  const refreshBtn = document.getElementById('refreshBtn');
  refreshBtn.disabled = true;
  refreshBtn.classList.add('spinning');
  document.getElementById('loading').style.display = 'block';
  document.getElementById('empty').style.display = 'none';
  document.getElementById('content').style.display = 'none';
  try {
    const r = await fetch(API_BASE + '/api/profit', { cache: 'no-store' });
    if (r.status === 401) { document.getElementById('gate').style.display = 'flex'; document.getElementById('app').style.display = 'none'; return; }
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || '讀取失敗');
    currentData = d;
    render();
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
    document.getElementById('empty').textContent = t('loadFailed') + e.message;
  } finally {
    refreshBtn.disabled = false;
    setTimeout(() => refreshBtn.classList.remove('spinning'), 500);
  }
}

// ── 分類／篩選／排序 ────────────────────────────────────────────────────────
// 批次狀態分類：對應狀態分頁（全部／出貨中／已完成／成本未填／未連結）
function catKey(b) {
  if (b.batchId === '__unlinked__') return 'unlinked';
  if (b.costStatus === 'none') return 'missing';
  const isDone = b.deliveryStatus === '全數出貨' || (b.shippedBoxes >= b.totalBoxes && b.totalBoxes > 0);
  if (isDone) return 'done';
  return 'shipping';
}
function catsList() {
  return [
    { key: 'all', label: t('catAll') },
    { key: 'shipping', label: t('catShipping') },
    { key: 'done', label: t('catDone') },
    { key: 'missing', label: t('catMissing') },
    { key: 'unlinked', label: t('catUnlinked') },
  ];
}
// baseVisible：目前「顯示未出貨批次」設定下，會出現在分頁計數/篩選裡的批次全集
function baseVisible(d) {
  return d.batches.filter(b => showInactive || b.shippedBoxes > 0 || b.futureBoxes > 0);
}
function sortBatches(list) {
  const arr = list.slice();
  if (sortMode === 'margin') arr.sort((a, b) => b.marginRate - a.marginRate);
  else if (sortMode === 'profit') arr.sort((a, b) => b.margin - a.margin);
  else arr.sort((a, b) => (b.ivName || '').localeCompare(a.ivName || ''));
  return arr;
}
function visibleBatches(d) {
  let list = baseVisible(d);
  if (currentCat !== 'all') list = list.filter(b => catKey(b) === currentCat);
  if (lossOnly) list = list.filter(b => b.margin < 0);
  return sortBatches(list);
}

// ── 渲染 ──────────────────────────────────────────────────────────────────
function render() {
  applyStaticTranslations();
  document.getElementById('loading').style.display = 'none';
  const d = currentData;
  document.getElementById('content').style.display = 'block';
  document.getElementById('content').innerHTML =
    renderBanners(d) + renderKPI(d) + renderCatTabsHtml(d) + renderControls() + renderVisualSection() + renderBatchTable(d) + renderMonthTable(d);
  document.getElementById('lastUpdatedClock').textContent = formatClock(d.lastUpdated);
  document.getElementById('srcFooter').textContent = t('footerSource', (d.lastUpdated || '').replace('T',' ').slice(0,16));
  bindCatTabs();
  renderVisual(currentData);
  renderMonthTrend(currentData);
  bindControls();
  bindBatchRows();
  bindCostForms();
  bindLogisticsRows();
}

function renderBanners(d) {
  const rows = [];
  if (d.fy.batchesWithMissingCost > 0) {
    rows.push(`<div class="pd-todo-row"><span class="pd-todo-dot bad"></span><span><span class="pd-todo-tag">${t('tagMissingCost')}</span>${esc(t('missingCostMsg', d.fy.batchesWithMissingCost))}</span></div>`);
  }
  if (d.fy.monthsWithMissingLogistics.length > 0) {
    rows.push(`<div class="pd-todo-row"><span class="pd-todo-dot"></span><span><span class="pd-todo-tag">${t('tagMissingLogistics')}</span>${esc(t('missingLogisticsMsg', d.fy.monthsWithMissingLogistics.map(esc).join('、')))}</span></div>`);
  }
  const orphan = d.batches.find(b => b.batchId === '__unlinked__');
  if (orphan) {
    rows.push(`<div class="pd-todo-row"><span class="pd-todo-dot"></span><span><span class="pd-todo-tag">${t('tagUnlinked')}</span>${esc(t('unlinkedMsg', orphan.rows.length))}</span></div>`);
  }
  if (!rows.length) return '';
  return `<div class="pd-todo"><div class="pd-todo-title">${t('todoTitle')}</div>${rows.join('')}</div>`;
}

// KPI 一律統計全部批次（不受篩選影響）
function renderKPI(d) {
  const all = d.batches;
  const totalRevenue = all.reduce((s, b) => s + b.revenue, 0);
  const totalCost = all.reduce((s, b) => s + b.allocImport + b.allocLogistics, 0);
  const totalProfit = totalRevenue - totalCost;
  const avgMargin = totalRevenue ? (totalProfit / totalRevenue * 100) : 0;
  const lossCount = all.filter(b => b.shippedBoxes > 0 && b.margin < 0).length;
  return `<div class="pd-kpi">
    <div><div class="lbl">${t('kpiTotalRevenue')}</div><div class="val num">NT$ ${fmt(totalRevenue)}</div><div class="sub">${t('kpiBatchesUnit', all.length)}</div></div>
    <div><div class="lbl">${t('kpiTotalCost')}</div><div class="val num">NT$ ${fmt(totalCost)}</div><div class="sub">${t('kpiCostConverted')}</div></div>
    <div class="accent"><div class="lbl">${t('kpiTotalProfit')}</div><div class="val num">NT$ ${fmt(totalProfit)}</div><div class="sub">${t('kpiIncludesShipping')}</div></div>
    <div><div class="lbl">${t('kpiAvgMargin')}</div><div class="val num">${avgMargin.toFixed(1)}%</div><div class="sub">${t('kpiLossCount', lossCount)}</div></div>
  </div>`;
}

function catCount(d, key) {
  const base = baseVisible(d);
  if (key === 'all') return base.length;
  return base.filter(b => catKey(b) === key).length;
}
function renderCatTabsHtml(d) {
  return `<div class="pd-tabs" id="catTabs">${catsList().map(c =>
    `<button class="pd-tab${c.key===currentCat?' active':''}" data-cat="${c.key}">${c.label}<span class="cnt">${catCount(d, c.key)}</span></button>`
  ).join('')}</div>`;
}
function bindCatTabs() {
  document.querySelectorAll('.pd-tab').forEach(btn => {
    btn.addEventListener('click', () => { currentCat = btn.dataset.cat; render(); });
  });
}

function renderControls() {
  return `<div class="pd-controls">
    <span class="lbl">${t('sortLabel')}</span>
    <div class="pd-seg" id="sortSeg">
      <button data-sort="margin" class="${sortMode==='margin'?'active':''}">${t('sortMargin')}</button>
      <button data-sort="profit" class="${sortMode==='profit'?'active':''}">${t('sortProfit')}</button>
      <button data-sort="batch" class="${sortMode==='batch'?'active':''}">${t('sortBatch')}</button>
    </div>
    <label class="pd-chk"><input type="checkbox" id="lossOnlyChk" ${lossOnly?'checked':''}> ${t('lossOnlyLabel')}</label>
  </div>`;
}
function bindControls() {
  document.getElementById('showInactiveChk').checked = showInactive;
  document.getElementById('showInactiveChk').addEventListener('change', e => { showInactive = e.target.checked; render(); });
  document.getElementById('sortSeg').addEventListener('click', e => {

    if (!btn) return;
    sortMode = btn.dataset.sort;

function renderVisualSection() {
  return `<div class="pd-visual">
    <div class="pd-panel">
      <div class="pd-panel-head"><h3>${t('panelBatchMargin')}</h3><span class="unit">NT$</span></div>
      <div id="chartBars"></div>
    </div>
    <div class="pd-panel">
      <h3 style="margin-bottom:var(--space-3);">${t('panelMarginBucket')}</h3>
      <div id="bucketChart"></div>
    </div>
  </div>
  <div class="pd-panel" style="margin-top:var(--space-4);">
    <div class="pd-panel-head"><h3>${t('panelMonthTrend')}</h3><span class="unit">%</span></div>
    <div id="monthTrend"></div>
  </div>`;
}
// 月度毛利率趨勢：由舊到新排列，方便看走勢；沒出貨（營收為0）的月份不畫
function renderMonthTrend(d) {
  const el = document.getElementById('monthTrend');
  if (!el) return;
  const months = d.months.filter(m => m.revenue > 0).slice().sort((a, b) => a.month.localeCompare(b.month));
  if (!months.length) { el.innerHTML = `<div class="pd-empty-note">${t('noMonthData')}</div>`; return; }
  const maxAbs = Math.max(1, ...months.map(m => Math.abs(m.marginRate)));
  el.innerHTML = months.map(m => {
    const barPct = Math.max(2, Math.abs(m.marginRate) / maxAbs * 100);
    const color = marginColor(m.margin);
    return `<div class="pd-bar-row"><div class="pd-bar-name">${esc(m.month)}</div>
      <div class="pd-bar-track"><div class="pd-bar-fill" style="width:${barPct}%;background:${color};"></div></div>
      <div class="pd-bar-val num" style="color:${color};">${pct(m.marginRate)}</div></div>`;
  }).join('');
}
function renderVisual(d) {
  const list = visibleBatches(d).filter(b => b.shippedBoxes > 0); // 尚未出貨的批次沒有意義的毛利可畫
  const chartSrc = list.slice().sort((a, b) => b.margin - a.margin);
  const maxAbs = Math.max(1, ...chartSrc.map(b => Math.abs(b.margin)));
  const top = chartSrc.slice(0, 7);
  document.getElementById('chartBars').innerHTML = top.length ? top.map(b => {
    const barPct = Math.max(2, Math.abs(b.margin) / maxAbs * 100);
    const color = marginColor(b.margin);
    const name = esc(b.productSummary || b.ivName);
    return `<div class="pd-bar-row"><div class="pd-bar-name" title="${name}">${name}</div>
      <div class="pd-bar-track"><div class="pd-bar-fill" style="width:${barPct}%;background:${color};"></div></div>
      <div class="pd-bar-val num" style="color:${color};">${fmtSigned(b.margin)}</div></div>`;
  }).join('') : `<div class="pd-empty-note">${t('noBatchInCat')}</div>`;

  const buckets = [
    { label: t('bucket40'), test: m => m >= 0.40, color: 'var(--color-text)' },
    { label: t('bucket20_40'), test: m => m >= 0.20 && m < 0.40, color: 'var(--color-neutral-600)' },
    { label: t('bucket0_20'), test: m => m >= 0 && m < 0.20, color: 'var(--color-neutral-400)' },
    { label: t('bucketLoss'), test: m => m < 0, color: 'var(--color-accent)' },
  ];
  const denom = Math.max(1, list.length);
  document.getElementById('bucketChart').innerHTML = buckets.map(b => {
    const count = list.filter(x => b.test(x.marginRate)).length;
    const p = count / denom * 100;
    return `<div class="pd-bucket"><div class="pd-bucket-head"><span>${b.label}</span><span class="cnt num">${t('countUnit', count)}</span></div>
      <div class="pd-bucket-track"><div class="pd-bucket-fill" style="width:${p}%;background:${b.color};"></div></div></div>`;
  }).join('');
}

function batchStatusHtml(b) {
  if (b.batchId === '__unlinked__') {
    let html = `<span class="tag tag-accent">${t('tagUnlinked')}</span>`;
    if (b.missingPriceRows > 0) html += `<span class="plain-note">${t('missingPriceNote', b.missingPriceRows)}</span>`;
    return html;
  }
  let chip;
  const isDone = b.deliveryStatus === '全數出貨' || (b.shippedBoxes >= b.totalBoxes && b.totalBoxes > 0);
  if (b.costStatus === 'none') chip = `<span class="tag tag-accent">${t('tagMissingCost')}</span>`;
  else if (b.costStatus === 'partial') chip = `<span class="tag tag-accent">${t('tagCostPartial')}</span>`;
  else if (isDone) chip = `<span class="tag tag-neutral">${t('tagDone')}</span>`;
  else if (b.shippedBoxes <= 0 && b.futureBoxes <= 0) chip = `<span class="tag tag-neutral">${t('tagNotShipped')}</span>`;
  else chip = `<span class="tag tag-accent">${t('catShipping')}</span>`;
  let html = chip;
  if (b.missingPriceRows > 0) html += `<span class="plain-note">${t('missingPriceNote', b.missingPriceRows)}</span>`;
  return html;
}

function renderBatchTable(d) {
  const list = visibleBatches(d);
  return `<div class="pd-table-wrap">
    <div class="pd-table-head"><h3>${t('tableTitle')}</h3><span class="meta">${t('tableMeta', list.length)}</span></div>
    <div class="pd-scroll"><table class="pd-table">
      <thead><tr>
        <th style="width:26%">${t('colBatchProduct')}</th><th class="r" style="width:14%">${t('colShipStock')}</th>
        <th class="r" style="width:11%">${t('colShiire')}</th><th class="r" style="width:13%">${t('colCost')}</th>
        <th class="r" style="width:13%">${t('colRevenue')}</th><th class="r" style="width:13%">${t('colMargin')}</th>
        <th class="r" style="width:10%">${t('colMarginRate')}</th><th style="width:10%">${t('colStatus')}</th>
      </tr></thead>
      <tbody id="batchBody">${list.map((b, idx) => {
        const noData = b.shippedBoxes <= 0;
        const color = noData ? 'var(--color-neutral-600)' : marginColor(b.margin);
        const barPct = b.totalBoxes > 0 ? Math.min(100, Math.round(b.shippedBoxes / b.totalBoxes * 100)) : 0;
        const costInput = b.batchId === '__unlinked__' || b.shiireJpyRaw == null
          ? `<span class="num" style="color:var(--color-neutral-600);">${t('notFilled')}</span>`
          : `<span class="num">${fmt(b.shiireJpyRaw)}</span>`;
        return `<tr class="pd-row" data-idx="${idx}">
            <td>
              <div class="pd-name"><span class="pd-caret">▸</span>${esc(b.productSummary || b.ivName)}</div>
              <div class="pd-id num">${esc(b.ivName)}</div>
            </td>
            <td class="r">
              <div class="num">${fmt(b.shippedBoxes)} / ${fmt(b.totalBoxes)}</div>
              <div class="pd-bucket-track" style="max-width:90px;margin-top:5px;margin-left:auto;"><div class="pd-bucket-fill" style="width:${barPct}%;background:var(--color-text);"></div></div>
            </td>
            <td class="r">${costInput}</td>
            <td class="r num">${fmt(b.allocImport + b.allocLogistics)}</td>
            <td class="r num">${fmt(b.revenue)}</td>
            <td class="r num" style="font-weight:800;color:${color};">${noData ? '－' : fmtSigned(b.margin)}</td>
            <td class="r num" style="font-weight:700;color:${color};">${noData ? '－' : pct(b.marginRate)}</td>
            <td>${batchStatusHtml(b)}</td>
          </tr>
          <tr class="pd-detail" data-expand="${idx}" style="display:none;"><td colspan="8"></td></tr>`;
      }).join('')}</tbody>
    </table></div>
    <div class="pd-note">${t('tableNote')}</div>
  </div>`;
}

function bindBatchRows() {
  document.querySelectorAll('tr.pd-row').forEach(row => {
    row.addEventListener('click', (e) => {
      if (e.target.closest('.pd-costform')) return;
      toggleBatchRow(Number(row.dataset.idx));
    });
  });
}

function toggleBatchRow(idx) {
  const row = document.querySelector(`tr.pd-row[data-idx="${idx}"]`);
  const expandRow = document.querySelector(`tr.pd-detail[data-expand="${idx}"]`);
  const isOpen = row.classList.contains('open');
  document.querySelectorAll('tr.pd-row.open').forEach(r => r.classList.remove('open'));
  document.querySelectorAll('tr.pd-detail').forEach(r => { r.style.display = 'none'; r.querySelector('td').innerHTML = ''; });
  if (isOpen) return;

  row.classList.add('open');
  const b = visibleBatches(currentData)[idx];
  const subRows = b.rows.map(s => {
    const cls = s.isFuture ? ' class="future"' : '';
    return `<tr${cls}>
      <td>${esc(s.date || '—')}${s.isFuture ? t('planned') : ''}</td><td>${esc(s.store || '—')}</td>
      <td class="r num">${fmt(s.boxes)}</td>
      <td class="r num">${s.isFuture ? '—' : fmt(s.revenue)}</td>
      <td class="r num">${s.isFuture ? '—' : fmt(s.allocImport)}</td>
      <td class="r num">${s.isFuture ? '—' : fmt(s.allocLogistics)}</td>
      <td class="r num">${s.isFuture ? '—' : fmtSigned(s.margin)}</td>
    </tr>`;
  }).join('');
  const costNote = t('costNoteTpl', fmt(b.shiireTwd), fmt(b.tariffCustoms), fmt(b.miscFee), fmt(b.costFull), fmt(b.shippedBoxes), fmt(b.totalBoxes));
  const costFormHtml = b.batchId === '__unlinked__' ? '' : `
    <div class="pd-costform" data-batch-idx="${idx}">
      <div class="pd-field"><label>${t('fieldShiire')}</label><input class="cf-shiire" inputmode="decimal" placeholder="${t('notFilled')}"></div>
      <div class="pd-field"><label>${t('fieldTariff')}</label><input class="cf-tariff" inputmode="decimal" placeholder="${t('notFilled')}"></div>
      <div class="pd-field"><label>${t('fieldMisc')}</label><input class="cf-misc" inputmode="decimal" placeholder="${t('notFilled')}"></div>
      <button class="pd-savebtn cf-save">${t('saveBtn')}</button>
      <div class="pd-toast cf-note">${esc(costNote)}</div>
    </div>`;
  expandRow.querySelector('td').innerHTML = `
    <div class="pd-detail-box">
    <table class="detail-table">
      <thead><tr>
        <th>${t('detailShipDate')}</th><th>${t('detailStore')}</th><th class="r">${t('detailBoxes')}</th><th class="r">${t('detailRevenue')}</th>
        <th class="r">${t('detailAllocImport')}</th><th class="r">${t('detailAllocLogistics')}</th><th class="r">${t('detailMargin')}</th>
      </tr></thead><tbody>${subRows || `<tr><td colspan="7">${t('detailNoRecords')}</td></tr>`}</tbody>
    </table>${costFormHtml}
    </div>`;
  expandRow.style.display = 'table-row';
  bindCostForms();
}

function bindCostForms() {
  document.querySelectorAll('.pd-costform').forEach(form => {
    if (form.dataset.bound) return;
    form.dataset.bound = '1';
    const idx = Number(form.dataset.batchIdx);
    const b = visibleBatches(currentData)[idx];
    const shiireEl = form.querySelector('.cf-shiire');
    const tariffEl = form.querySelector('.cf-tariff');
    const miscEl = form.querySelector('.cf-misc');
    if (b.shiireJpyRaw != null) shiireEl.value = String(b.shiireJpyRaw);
    if (b.tariffCustomsRaw != null) tariffEl.value = String(b.tariffCustomsRaw);
    if (b.miscFeeRaw != null) miscEl.value = String(b.miscFeeRaw);
    const btn = form.querySelector('.cf-save');
    const note = form.querySelector('.cf-note');
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      let payload;
      try {
        payload = {
          batchId: b.batchId,
          shiireJpy: parseInputNum(shiireEl, t('errShiireLabel')),
          tariffCustoms: parseInputNum(tariffEl, t('errTariffLabel')),
          miscFee: parseInputNum(miscEl, t('errMiscLabel')),
        };
      } catch (err) { note.textContent = err.message; note.className = 'pd-toast cf-note bad'; return; }
      btn.disabled = true;
      note.textContent = t('savingMsg'); note.className = 'pd-toast cf-note';
      try {
        const r = await fetch(API_BASE + '/api/profit/costs', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
        });
        const resp = await r.json();
        if (!r.ok) throw new Error(resp.error || '存檔失敗');
        note.textContent = t('savedOkMsg'); note.className = 'pd-toast cf-note ok';
        await loadData();
      } catch (err) {
        note.textContent = t('saveFailedPrefix') + err.message; note.className = 'pd-toast cf-note bad';
        btn.disabled = false;
      }
    });
  });
}

// ── 月度彙總＋物流輸入 ────────────────────────────────────────────────────
function renderMonthTable(d) {
  const byMonth = new Map();
  for (const m of d.months) byMonth.set(m.month, { ...m });
  for (const l of d.logisticsEntries) {
    if (!byMonth.has(l.month)) byMonth.set(l.month, { month: l.month, boxes: 0, revenue: 0, importCost: 0, logistics: (l.sanyi||0)+(l.yuchu||0), logisticsFilled: true, margin: 0, marginRate: 0 });
  }
  const logByMonth = new Map(d.logisticsEntries.map(l => [l.month, l]));
  const months = [...byMonth.values()].sort((a, b) => b.month.localeCompare(a.month));

  const rows = months.map((m, i) => {
    const log = logByMonth.get(m.month);
    const sanyiVal = log && log.sanyi != null ? String(log.sanyi) : '';
    const yuchuVal = log && log.yuchu != null ? String(log.yuchu) : '';
    const color = m.revenue > 0 ? marginColor(m.margin) : 'var(--color-text)';
    return `<tr>
      <td class="num">${esc(m.month)}</td>
      <td class="r num">${fmt(m.boxes)}</td>
      <td class="r num">${fmt(m.revenue)}</td>
      <td class="r num">${fmt(m.importCost)}</td>
      <td>
        <div class="month-flex">
          <input class="month-input lg-sanyi" data-m="${i}" inputmode="decimal" placeholder="三義" value="${esc(sanyiVal)}">
          <input class="month-input lg-yuchu" data-m="${i}" inputmode="decimal" placeholder="優儲" value="${esc(yuchuVal)}">
          <button class="month-save lg-save" data-m="${i}" data-month="${esc(m.month)}">${t('saveShort')}</button>
        </div>
        <div class="row-note lg-note" data-m="${i}">${m.logisticsFilled ? '' : t('logisticsUnfilledNote')}</div>
      </td>
      <td class="r num" style="color:${color};font-weight:800;">${m.revenue > 0 ? fmtSigned(m.margin) : '－'}</td>
      <td class="r num" style="color:${color};font-weight:700;">${m.revenue > 0 ? pct(m.marginRate) : '－'}</td>
    </tr>`;
  }).join('');

  return `<h2 class="pd-section">${t('monthSectionTitle')}<span class="hint"> ${t('monthSectionHint')}</span></h2>
    <div class="pd-table-wrap"><div class="pd-scroll"><table class="pd-table">
      <thead><tr>
        <th>${t('colMonth')}</th><th class="r">${t('colBoxes')}</th><th class="r">${t('colRevenue2')}</th><th class="r">${t('colImportAlloc')}</th>
        <th>${t('colLogistics')}</th><th class="r">${t('colMargin')}</th><th class="r">${t('colMarginRate')}</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tbody><tr>
        <td colspan="7" style="padding:12px 14px;">
          <div class="month-flex" style="font-size:12px;color:var(--color-neutral-600);">
            ${t('addOtherMonth')}
            <input class="month-input month" id="newLogMonth" type="month">
            <input class="month-input" id="newLogSanyi" inputmode="decimal" placeholder="三義">
            <input class="month-input" id="newLogYuchu" inputmode="decimal" placeholder="優儲">
            <button class="month-save" id="newLogSave">${t('saveShort')}</button>
            <span class="row-note" id="newLogNote"></span>
          </div>
        </td>
      </tr></tbody>
    </table></div></div>`;
}

async function saveLogistics(month, sanyiEl, yuchuEl, btn, noteEl) {
  let sanyi, yuchu;
  try {
    sanyi = parseInputNum(sanyiEl, t('errSanyiLabel'));
    yuchu = parseInputNum(yuchuEl, t('errYuchuLabel'));
  } catch (err) { noteEl.textContent = err.message; noteEl.classList.add('bad'); return; }
  btn.disabled = true;
  noteEl.className = noteEl.className.replace(/\b(ok|bad)\b/g, '').trim();
  noteEl.textContent = t('savingMsg');
  try {
    const r = await fetch(API_BASE + '/api/profit/logistics', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ month, sanyi, yuchu }),
    });
    const resp = await r.json();
    if (!r.ok) throw new Error(resp.error || '存檔失敗');
    noteEl.textContent = t('savedNote'); noteEl.classList.add('ok');
    await loadData();
  } catch (err) {
    noteEl.textContent = t('saveFailedPrefix') + err.message; noteEl.classList.add('bad');
    btn.disabled = false;
  }
}

function bindLogisticsRows() {
  document.querySelectorAll('button.lg-save').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = btn.dataset.m;
      saveLogistics(
        btn.dataset.month,
        document.querySelector(`input.lg-sanyi[data-m="${i}"]`),
        document.querySelector(`input.lg-yuchu[data-m="${i}"]`),
        btn,
        document.querySelector(`.lg-note[data-m="${i}"]`),
      );
    });
  });
  const newSave = document.getElementById('newLogSave');
  if (newSave) newSave.addEventListener('click', () => {
    const month = document.getElementById('newLogMonth').value;
    const note = document.getElementById('newLogNote');
    if (!/^\d{4}-\d{2}$/.test(month)) { note.textContent = t('pleaseSelectMonth'); note.classList.add('bad'); return; }
    saveLogistics(month, document.getElementById('newLogSanyi'), document.getElementById('newLogYuchu'), newSave, note);
  });
}

// ── 啟動 ──────────────────────────────────────────────────────────────────
applyStaticTranslations();
bindLangSeg();
document.getElementById('pwSubmit').addEventListener('click', doLogin);
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('refreshBtn').addEventListener('click', loadData);

(async function init() {
  const authed = await checkAuth();
  if (authed) showApp();
})();
</script>
