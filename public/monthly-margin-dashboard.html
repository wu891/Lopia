<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOPIA 月結毛利報告</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* ── 設計方向：総勘定（帳簿風）── 這頁的本質就是核對一本現金流帳簿，
     所以整頁做成一張真正的「帳」：襯線標題、米白紙感、等寬數字、狀態用文字
     不用色塊，跟現有網站的卡片式視覺刻意區分開，因為這裡是財務對帳工具。 */
  :root {
    --paper: #f6f4ee; --paper-2: #fffdf9; --ink: #1e1c18; --ink-2: #6b6558;
    --rule: #d9d2c2; --rule-strong: #b7ae98;
    --red: #b3122b; --red-bg: #f6e3e1; --green: #2e5d40; --green-bg: #e7efe9;
    --amber: #8a5a19; --amber-bg: #f3ead4;
    --serif: 'Noto Serif TC', 'Hiragino Mincho ProN', Georgia, serif;
    --sans: -apple-system, 'Hiragino Sans', 'Noto Sans TC', sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, 'Noto Sans TC', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--serif); background: var(--paper); color: var(--ink); line-height: 1.6; -webkit-font-smoothing: antialiased; }
  .sans { font-family: var(--sans); }
  .mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }

  /* ── 密碼閘門 ── */
  #gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  #gate .box { background: var(--paper-2); border: 1px solid var(--rule); border-radius: 4px; padding: 44px 40px; width: 320px; text-align: center; }
  #gate .rule { width: 40px; height: 3px; background: var(--red); margin: 0 auto 18px; }
  #gate h1 { font-size: 19px; font-weight: 700; margin-bottom: 8px; }
  #gate p { font-family: var(--sans); font-size: 12.5px; color: var(--ink-2); margin-bottom: 24px; }
  #gate input {
    width: 100%; padding: 11px 13px; border: none; border-bottom: 1.5px solid var(--rule-strong);
    background: transparent; font-family: var(--sans); font-size: 14px; margin-bottom: 14px; text-align: center;
  }
  #gate input:focus { outline: none; border-bottom-color: var(--red); }
  #gate button {
    width: 100%; padding: 11px; border: 1.5px solid var(--ink); border-radius: 2px; background: var(--ink);
    color: var(--paper-2); font-family: var(--sans); font-weight: 700; font-size: 13.5px; letter-spacing: 0.5px; cursor: pointer;
  }
  #gate button:hover:not(:disabled) { background: var(--red); border-color: var(--red); }
  #gate button:disabled { opacity: 0.5; cursor: not-allowed; }
  #gate .err { font-family: var(--sans); color: var(--red); font-size: 12px; margin-top: 12px; min-height: 16px; font-weight: 600; }

  /* ── 主畫面 ── */
  #app { display: none; }
  .wrap { max-width: 920px; margin: 0 auto; padding: 52px 36px 100px; }

  .letterhead { display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 18px; border-bottom: 3px double var(--rule-strong); flex-wrap: wrap; gap: 12px; }
  .letterhead h1 { font-size: 25px; font-weight: 700; letter-spacing: 0.5px; }
  .letterhead .actions { display: flex; gap: 10px; align-items: center; font-family: var(--sans); }
  select#monthPicker {
    font-family: var(--sans); font-size: 13.5px; font-weight: 600; background: var(--paper-2);
    border: 1px solid var(--rule-strong); padding: 8px 12px; border-radius: 2px; color: var(--ink); cursor: pointer;
  }
  button.link {
    font-family: var(--sans); background: none; border: 1px solid var(--rule-strong); color: var(--ink-2);
    font-size: 12.5px; font-weight: 600; cursor: pointer; padding: 8px 14px; border-radius: 2px;
  }
  button.link:hover { border-color: var(--ink); color: var(--ink); }
  .subline { font-family: var(--sans); font-size: 12.5px; color: var(--ink-2); margin-top: 10px; }

  .banner { font-family: var(--sans); font-size: 13px; padding: 11px 0; border-bottom: 1px dotted var(--rule-strong); line-height: 1.7; }
  .banner .tag { font-weight: 700; color: var(--amber); margin-right: 6px; }
  .banner.bad .tag { color: var(--red); }
  .banner ul { margin: 6px 0 0 20px; }
  .banner li { margin-bottom: 2px; }

  .totals-row { display: flex; margin: 32px 0; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); flex-wrap: wrap; }
  .totals-row .cell { flex: 1; min-width: 130px; padding: 16px 20px; border-left: 1px solid var(--rule); }
  .totals-row .cell:first-child { border-left: none; }
  .totals-row .cell .l { font-family: var(--sans); font-size: 11px; color: var(--ink-2); letter-spacing: 0.3px; }
  .totals-row .cell .v { font-size: 21px; margin-top: 5px; }
  .totals-row .cell.hero .v { color: var(--green); font-weight: 700; }
  .totals-row .cell.hero.loss .v { color: var(--red); }

  h2.section {
    font-family: var(--sans); font-size: 12.5px; font-weight: 700; letter-spacing: 1.2px; color: var(--ink-2);
    margin: 38px 0 6px; text-transform: uppercase;
  }
  h2.section .hint { font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--ink-2); font-size: 11.5px; }

  table.ledger-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  table.ledger-table thead th {
    font-family: var(--sans); text-align: left; font-size: 10.5px; font-weight: 700; color: var(--ink-2);
    padding: 8px 10px; border-bottom: 1.5px solid var(--rule-strong); text-transform: uppercase; letter-spacing: 0.4px;
  }
  table.ledger-table tbody td { padding: 13px 10px; border-bottom: 1px solid var(--rule); font-size: 14.5px; vertical-align: top; }
  table.ledger-table td.num, table.ledger-table th.num { text-align: right; }
  table.ledger-table tr.batch-row { cursor: pointer; }
  table.ledger-table tr.batch-row:hover { background: rgba(0,0,0,0.02); }
  table.ledger-table tr.batch-row.open td { border-bottom-color: var(--rule); }
  table.ledger-table .caret { display: inline-block; width: 12px; font-family: var(--sans); color: var(--ink-2); transition: transform .12s; }
  table.ledger-table tr.batch-row.open .caret { transform: rotate(90deg); }
  .status { font-family: var(--sans); font-size: 11px; font-weight: 700; }
  .status.good { color: var(--green); }
  .status.bad { color: var(--red); }
  .status.pending::before { content: "待指定 · "; color: var(--amber); }
  .margin-figure.good { color: var(--green); font-weight: 700; }
  .margin-figure.bad { color: var(--red); font-weight: 700; }

  tr.expand-row td { background: #efece2; padding: 4px 10px 18px; }
  tr.expand-row table { width: 100%; font-size: 12.5px; margin-top: 6px; }
  tr.expand-row table th { font-family: var(--sans); font-weight: 600; color: var(--ink-2); text-align: left; padding: 4px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; }
  tr.expand-row table td { padding: 6px 10px; border-bottom: 1px dotted var(--rule-strong); font-size: 13px; }
  tr.expand-row table td.num, tr.expand-row table th.num { text-align: right; }

  select.picker {
    font-family: var(--sans); font-size: 12.5px; background: var(--paper-2); border: 1px solid var(--rule-strong);
    padding: 6px 10px; border-radius: 2px; cursor: pointer; min-width: 220px;
  }
  .preview-note { font-family: var(--sans); font-size: 11.5px; color: var(--ink-2); margin-top: 4px; font-style: italic; }
  .preview-note.set { color: var(--green); font-style: normal; font-weight: 600; }
  .preview-note.bad { color: var(--red); font-style: normal; font-weight: 600; }

  footer.src { font-family: var(--sans); font-size: 11px; color: var(--ink-2); margin-top: 40px; padding-top: 16px; border-top: 1px solid var(--rule); text-align: center; line-height: 1.9; }
  #loading, #empty { font-family: var(--sans); text-align: center; padding: 80px 0; color: var(--ink-2); font-size: 14px; }

  @media (max-width: 640px) {
    .wrap { padding: 32px 18px 80px; }
    table.ledger-table thead { display: none; }
    table.ledger-table td:not(:first-child):not(.always-show) { display: none; }
  }
</style>
</head>
<body>

<div id="gate">
  <div class="box">
    <div class="rule"></div>
    <h1>月結毛利報告</h1>
    <p>財務資料，需要密碼才能查看</p>
    <input id="pwInput" type="password" placeholder="請輸入密碼" autocomplete="current-password">
    <button id="pwSubmit">進入</button>
    <div class="err" id="pwErr"></div>
  </div>
</div>

<div id="app">
  <div class="wrap">
    <div class="letterhead">
      <h1>月結毛利報告</h1>
      <div class="actions">
        <select id="monthPicker"></select>
        <button class="link" id="refreshBtn">重新整理</button>
      </div>
    </div>
    <div class="subline">成本對回真正來源進口批次 · 每次打開現場重算，不存快照</div>

    <div id="loading">載入中…</div>
    <div id="empty" style="display:none;"></div>
    <div id="content" style="display:none;"></div>

    <footer class="src" id="srcFooter"></footer>
  </div>
</div>

<script>
const API_BASE = '';
let currentData = null;

function fmt(n) { return Math.round(n || 0).toLocaleString('en-US'); }
function pct(r) { return ((r || 0) * 100).toFixed(1) + '%'; }
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
// 一批可能對到好幾張出貨單的 S 單號（一批供多次出貨），列表標題全部列出來
function sNoLabel(g) { return (g.sNos && g.sNos.length > 0) ? g.sNos.join('、') : g.invoice; }

// ── 密碼閘門 ──────────────────────────────────────────────────────────────
async function checkAuth() {
  try { const r = await fetch(API_BASE + '/api/auth'); const d = await r.json(); return !!d.ok; }
  catch { return false; }
}
async function doLogin() {
  const pw = document.getElementById('pwInput').value;
  const btn = document.getElementById('pwSubmit');
  const err = document.getElementById('pwErr');
  btn.disabled = true; err.textContent = '';
  try {
    const r = await fetch(API_BASE + '/api/auth', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ password: pw }) });
    const d = await r.json();
    if (d.ok) { showApp(); } else { err.textContent = d.error || '密碼錯誤'; }
  } catch { err.textContent = '連線失敗，請重試'; }
  finally { btn.disabled = false; }
}
function showApp() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initMonthPicker();
  loadMonth();
}

// ── 月份選單：預設上個月，可往前翻 12 個月 ──────────────────────────────────
function initMonthPicker() {
  const sel = document.getElementById('monthPicker');
  const now = new Date();
  const opts = [];
  for (let i = 1; i <= 13; i++) {
    const d = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth() - i, 1));
    const y = d.getUTCFullYear(), m = d.getUTCMonth() + 1;
    const value = `${y}-${String(m).padStart(2,'0')}`;
    opts.push(`<option value="${value}">${y}年${m}月</option>`);
  }
  sel.innerHTML = opts.join('');
  sel.selectedIndex = 0; // 上個月
  sel.addEventListener('change', loadMonth);
  document.getElementById('refreshBtn').addEventListener('click', loadMonth);
}

// ── 抓資料 ────────────────────────────────────────────────────────────────
async function loadMonth() {
  const month = document.getElementById('monthPicker').value;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('empty').style.display = 'none';
  document.getElementById('content').style.display = 'none';
  try {
    const r = await fetch(API_BASE + `/api/monthly-margin?month=${month}`, { cache: 'no-store' });
    if (r.status === 401) { document.getElementById('gate').style.display = 'flex'; document.getElementById('app').style.display = 'none'; return; }
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || '讀取失敗');
    currentData = d;
    render();
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
    document.getElementById('empty').textContent = '載入失敗：' + e.message;
  }
}

// ── 渲染 ──────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('loading').style.display = 'none';
  const d = currentData;
  const hasData = d.groups.length > 0 || d.unmatched.length > 0;
  if (!hasData) {
    document.getElementById('empty').style.display = 'block';
    document.getElementById('empty').textContent = `${d.year}年${d.month}月沒有讀到任何出貨單，請確認 Drive 出貨單資料夾裡有「${d.month}月」子資料夾`;
    document.getElementById('srcFooter').textContent = '';
    return;
  }
  document.getElementById('content').style.display = 'block';
  const c = document.getElementById('content');
  c.innerHTML = renderBanners(d) + renderTotals(d) + renderGroupTable(d) + renderUnmatchedTable(d);
  document.getElementById('srcFooter').textContent = renderSourceFooter(d);

  bindBatchRows();
  bindUnmatchedSelects();
}

function renderBanners(d) {
  let html = '';
  if (d.logistics.status === 'partial') {
    const missing = [];
    if (d.logistics.yuchu?.untaxedTotal == null) missing.push('優儲倉儲');
    if (d.logistics.sanyi?.untaxedSubtotal == null) missing.push('三義配送');
    html += `<div class="banner"><span class="tag">尚未到帳</span>${esc(missing.join('、'))}對帳單尚未到帳，以下毛利為「營收＋進貨成本」初版，物流分攤尚未算入。</div>`;
  }
  if (d.totals.unmatchedCount > 0) {
    html += `<div class="banner"><span class="tag">待處理</span>有 ${d.totals.unmatchedCount} 筆出貨單還沒指定來源批次，成本未算入下方總計，毛利會偏高。請往下手動指定，選了就會直接存起來。</div>`;
  }
  if (d.totals.missingPriceCount > 0) {
    html += `<div class="banner"><span class="tag">待處理</span>有 ${d.totals.missingPriceCount} 筆出貨單裡有商品項讀不到單價，該項未計入營收，請去對帳單補單價。</div>`;
  }
  if (d.warnings && d.warnings.length > 0) {
    html += `<div class="banner bad"><span class="tag">系統警告</span>共 ${d.warnings.length} 則<ul>${d.warnings.slice(0,20).map(w => `<li>${esc(w)}</li>`).join('')}</ul></div>`;
  }
  return html;
}

function renderTotals(d) {
  const t = d.totals;
  const heroCls = 'hero' + (t.margin < 0 ? ' loss' : '');
  return `<div class="totals-row mono">
    <div class="cell"><div class="l sans">出貨箱數</div><div class="v">${fmt(t.boxes)}</div></div>
    <div class="cell"><div class="l sans">營收（未稅）</div><div class="v">${fmt(t.revenue)}</div></div>
    <div class="cell"><div class="l sans">進貨成本</div><div class="v">${fmt(t.importCost)}</div></div>
    <div class="cell"><div class="l sans">物流成本</div><div class="v">${fmt(t.logisticsCost)}</div></div>
    <div class="cell ${heroCls}"><div class="l sans">毛利 · 毛利率</div><div class="v">${t.margin >= 0 ? '+' : ''}${fmt(t.margin)} · ${pct(t.marginRate)}</div></div>
  </div>`;
}

function renderGroupTable(d) {
  if (d.groups.length === 0) return '';
  const rows = d.groups.map((g, idx) => {
    const loss = g.margin < 0;
    return `<tr class="batch-row" data-idx="${idx}">
        <td><span class="caret">▸</span>${esc(sNoLabel(g))} · ${esc(g.product)}</td>
        <td><span class="status good">已比對</span></td>
        <td class="num mono">${fmt(g.shipments.reduce((s,x)=>s+x.boxes,0))}</td>
        <td class="num mono">${fmt(g.revenue)}</td>
        <td class="num mono">${fmt(g.importCost + g.logisticsCost)}</td>
        <td class="num mono margin-figure ${loss ? 'bad' : 'good'}">${g.margin >= 0 ? '+' : ''}${fmt(g.margin)}（${pct(g.marginRate)}）</td>
      </tr>
      <tr class="expand-row" data-expand="${idx}" style="display:none;"><td colspan="6"></td></tr>`;
  }).join('');
  return `<h2 class="section">依來源批次<span class="hint"> · 點列展開明細，毛利低→高排序</span></h2>
    <table class="ledger-table">
      <thead><tr>
        <th class="sans">批次 / 商品</th><th class="sans">狀態</th><th class="num sans">箱數</th>
        <th class="num sans">營收</th><th class="num sans">成本</th><th class="num sans">毛利</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function bindBatchRows() {
  document.querySelectorAll('tr.batch-row').forEach(row => {
    row.addEventListener('click', () => toggleBatchRow(Number(row.dataset.idx)));
  });
}

function toggleBatchRow(idx) {
  const row = document.querySelector(`tr.batch-row[data-idx="${idx}"]`);
  const expandRow = document.querySelector(`tr.expand-row[data-expand="${idx}"]`);
  const isOpen = row.classList.contains('open');
  // 手風琴：一次只展開一筆，先把其他都收起來
  document.querySelectorAll('tr.batch-row.open').forEach(r => { r.classList.remove('open'); });
  document.querySelectorAll('tr.expand-row').forEach(r => { r.style.display = 'none'; r.querySelector('td').innerHTML = ''; });
  if (isOpen) return; // 本來就開著 → 收起來就好

  row.classList.add('open');
  const g = currentData.groups[idx];
  const subRows = g.shipments.map(s => {
    const loss = s.margin < 0;
    return `<tr>
      <td>${esc(s.date)}</td><td>${esc(s.store)}</td>
      <td class="num">${fmt(s.boxes)}</td>
      <td class="num">${fmt(s.revenue)}</td>
      <td class="num">${fmt(s.allocImportCost)}</td>
      <td class="num">${fmt(s.allocLogisticsCost)}</td>
      <td class="num margin-figure ${loss ? 'bad' : 'good'}">${s.margin >= 0 ? '+' : ''}${fmt(s.margin)}</td>
      <td class="num">${pct(s.marginRate)}</td>
    </tr>`;
  }).join('');
  expandRow.querySelector('td').innerHTML = `<table class="mono">
    <thead><tr>
      <th class="sans">出貨日</th><th class="sans">門市</th><th class="num sans">箱數</th><th class="num sans">營收</th>
      <th class="num sans">分攤進貨</th><th class="num sans">分攤物流</th><th class="num sans">毛利</th><th class="num sans">毛利率</th>
    </tr></thead><tbody>${subRows}</tbody></table>`;
  expandRow.style.display = 'table-row';
}

function renderUnmatchedTable(d) {
  if (d.unmatched.length === 0) return '';
  // allBatches 已經依 Invoice 合併過（Invoice 保證唯一），直接拿 Invoice 字串當選項值，
  // 選了就是要存進 Notion 的值，不用再另外轉換。
  const optHtml = ['<option value="">－ 選擇來源批次 －</option>']
    .concat(d.allBatches.map(b => `<option value="${esc(b.invoice)}">${esc(b.invoice)} · ${esc(b.product)}（成本${fmt(b.totalCost)}／${fmt(b.totalBoxes)}箱）</option>`))
    .join('');
  const rows = d.unmatched.map((s, i) => `<tr>
      <td class="mono">${esc(s.sNo)}</td>
      <td class="mono">${esc(s.date)}</td>
      <td>${esc(s.store)}</td>
      <td class="num mono">${fmt(s.boxes)}</td>
      <td class="num mono">${fmt(s.revenue)}</td>
      <td>
        <select class="picker" data-idx="${i}">${optHtml}</select>
        <div class="preview-note" data-preview="${i}">尚未指定</div>
      </td>
    </tr>`).join('');
  return `<h2 class="section">待指定來源批次<span class="hint"> · 選了就直接存進 Notion「月結毛利批次配對」</span></h2>
    <table class="ledger-table">
      <thead><tr>
        <th class="sans">S單號</th><th class="sans">日期</th><th class="sans">門市</th>
        <th class="num sans">箱數</th><th class="num sans">營收</th><th class="sans">指定批次</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function bindUnmatchedSelects() {
  document.querySelectorAll('select.picker[data-idx]').forEach(sel => {
    sel.addEventListener('change', async () => {
      const idx = Number(sel.dataset.idx);
      const s = currentData.unmatched[idx];
      const note = document.querySelector(`.preview-note[data-preview="${idx}"]`);
      if (sel.value === '') { note.textContent = '尚未指定'; note.className = 'preview-note'; return; }
      const invoice = sel.value;
      sel.disabled = true;
      note.textContent = '存檔中…';
      note.className = 'preview-note';
      try {
        const r = await fetch(API_BASE + '/api/monthly-margin/match', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sNo: s.sNo, invoice }),
        });
        const resp = await r.json();
        if (!r.ok) throw new Error(resp.error || '存檔失敗');
        note.textContent = '已存進 Notion，重新整理中…';
        note.classList.add('set');
        await loadMonth(); // 重抓整份報表，讓這筆從「待指定」搬進對應批次的分組
      } catch (e) {
        note.textContent = '存檔失敗：' + e.message;
        note.classList.add('bad');
        sel.disabled = false;
      }
    });
  });
}

function renderSourceFooter(d) {
  const src = d.sourceFiles;
  const parts = [
    `現金流：${src.cashflowSheet || '讀取失敗'}`,
    `出貨單：${src.shipmentOrderFiles.length} 份`,
    `優儲：${src.yuchuFile || '尚未到帳'}`,
    `三義：${src.sanyiFile || '尚未到帳'}`,
  ];
  return parts.join(' ｜ ');
}

// ── 啟動 ──────────────────────────────────────────────────────────────────
document.getElementById('pwSubmit').addEventListener('click', doLogin);
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

(async function init() {
  const authed = await checkAuth();
  if (authed) showApp();
})();
</script>
